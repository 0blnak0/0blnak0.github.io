<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>📚 学生考勤管理系统（违纪统计排名）</title>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js">
    </script>
    <style>
        /* ===== 基础重置 & 通用样式 ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        * {
            touch-action: manipulation;
        }
        body {
            font-family: -apple-system, 'Segoe UI', 'PingFang SC', Roboto, 'Helvetica Neue', sans-serif;
            background: #f0f4f8;
            color: #1e293b;
            min-height: 100vh;
            padding: 12px;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            text-size-adjust: 100%;
            -webkit-text-size-adjust: 100%;
        }
        .app-container {
            max-width: 1100px;
            margin: 0 auto;
            background: #ffffff;
            border-radius: 20px;
            box-shadow: 0 8px 40px rgba(0, 20, 40, 0.06);
            overflow: hidden;
            padding: 16px 16px 32px;
        }
        @media (min-width: 640px) {
            .app-container {
                padding: 28px 32px 40px;
                border-radius: 24px;
            }
            body {
                padding: 20px;
            }
        }

        /* ===== 头部 ===== */
        .app-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
            padding-bottom: 16px;
            border-bottom: 2px solid #eef2f6;
            margin-bottom: 16px;
        }
        @media (min-width: 640px) {
            .app-header {
                padding-bottom: 24px;
                margin-bottom: 24px;
                gap: 16px;
            }
        }
        .app-header h1 {
            font-size: 20px;
            font-weight: 700;
            background: linear-gradient(135deg, #2563eb, #7c3aed);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .app-header h1 span {
            font-size: 24px;
            -webkit-text-fill-color: initial;
        }
        @media (min-width: 640px) {
            .app-header h1 {
                font-size: 26px;
            }
            .app-header h1 span {
                font-size: 28px;
            }
        }
        .header-actions {
            display: flex;
            gap: 4px;
            align-items: center;
            flex-wrap: wrap;
        }
        .header-date {
            font-size: 11px;
            color: #64748b;
            background: #f1f5f9;
            padding: 4px 10px;
            border-radius: 40px;
            font-weight: 500;
            white-space: nowrap;
        }
        @media (min-width: 640px) {
            .header-date {
                font-size: 14px;
                padding: 6px 16px;
            }
        }

        /* ===== 通用按钮 ===== */
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 6px 12px;
            border: none;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            background: #e9edf2;
            color: #334155;
            touch-action: manipulation;
            min-height: 32px;
            min-width: 32px;
            justify-content: center;
        }
        .btn:active {
            transform: scale(0.96);
        }
        @media (min-width: 640px) {
            .btn {
                padding: 8px 18px;
                font-size: 14px;
                min-height: 40px;
                min-width: 44px;
            }
        }
        .btn-primary {
            background: #2563eb;
            color: #fff;
        }
        .btn-primary:active {
            background: #1d4ed8;
        }
        .btn-success {
            background: #16a34a;
            color: #fff;
        }
        .btn-success:active {
            background: #15803d;
        }
        .btn-danger {
            background: #dc2626;
            color: #fff;
        }
        .btn-danger:active {
            background: #b91c1c;
        }
        .btn-outline {
            background: transparent;
            border: 1.5px solid #d1d9e6;
        }
        .btn-outline:active {
            border-color: #94a3b8;
            background: #f1f5f9;
        }
        .btn-sm {
            padding: 4px 10px;
            font-size: 11px;
            border-radius: 6px;
            min-height: 28px;
            min-width: 28px;
        }
        @media (min-width: 640px) {
            .btn-sm {
                padding: 4px 12px;
                font-size: 13px;
                min-height: 32px;
                min-width: 32px;
            }
        }
        .btn-xs {
            padding: 2px 8px;
            font-size: 11px;
            border-radius: 6px;
            min-height: 26px;
            min-width: 26px;
        }

        /* ===== 统计卡片 ===== */
        .stats-row {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-bottom: 16px;
        }
        @media (min-width: 480px) {
            .stats-row {
                grid-template-columns: repeat(4, 1fr);
                gap: 12px;
            }
        }
        @media (min-width: 640px) {
            .stats-row {
                gap: 16px;
                margin-bottom: 20px;
            }
        }
        .stat-card {
            background: #f8fafc;
            border-radius: 14px;
            padding: 12px 10px;
            text-align: center;
            border: 1px solid #e9edf2;
            display: flex;
            flex-direction: column;
            justify-content: center;
            min-height: 72px;
        }
        .stat-card .number {
            font-size: 22px;
            font-weight: 700;
            color: #0f172a;
            line-height: 1.2;
        }
        .stat-card .label {
            font-size: 11px;
            color: #64748b;
            margin-top: 2px;
            font-weight: 500;
        }
        @media (min-width: 480px) {
            .stat-card .number {
                font-size: 26px;
            }
            .stat-card .label {
                font-size: 13px;
            }
        }
        @media (min-width: 640px) {
            .stat-card {
                padding: 16px 18px;
                min-height: 88px;
            }
            .stat-card .number {
                font-size: 28px;
            }
        }
        .stat-card.accent .number {
            color: #2563eb;
        }
        .stat-card.green .number {
            color: #16a34a;
        }
        .stat-card.orange .number {
            color: #ea580c;
        }
        .stat-card.purple .number {
            color: #7c3aed;
        }
        .stat-card.red .number {
            color: #dc2626;
        }

        /* ===== 排序按钮 ===== */
        .btn-sort {
            background: transparent;
            border: none;
            font-weight: 700;
            color: #475569;
            cursor: pointer;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 13px;
            touch-action: manipulation;
            min-height: 28px;
            min-width: 28px;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }
        .btn-sort:active {
            background: #e9edf2;
        }
        .btn-sort .arrow {
            font-size: 12px;
            transition: transform 0.2s;
            display: inline-block;
        }
        .btn-sort .arrow.desc {
            transform: rotate(180deg);
        }
        .btn-sort.active {
            color: #2563eb;
        }

        /* ===== 违纪面板 ===== */
        .violation-section {
            margin-bottom: 16px;
            border: 1px solid #e9edf2;
            border-radius: 14px;
            background: #fafcfd;
            overflow: hidden;
        }
        .violation-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            cursor: pointer;
            font-weight: 600;
            font-size: 15px;
            color: #1e293b;
            background: #f8fafc;
            min-height: 48px;
        }
        .violation-header:active {
            background: #eef2f6;
        }
        @media (min-width: 640px) {
            .violation-header {
                padding: 14px 20px;
                font-size: 16px;
                min-height: 56px;
            }
        }
        .violation-header .arrow {
            transition: transform 0.25s;
            font-size: 14px;
            color: #94a3b8;
        }
        .violation-header .arrow.open {
            transform: rotate(90deg);
        }
        .violation-panel {
            padding: 12px 14px 16px;
            border-top: 1px solid #e9edf2;
            animation: fadeIn 0.25s ease;
        }
        @media (min-width: 640px) {
            .violation-panel {
                padding: 16px 20px 20px;
            }
        }

        .violation-form {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: flex-end;
            margin-bottom: 12px;
        }
        .violation-form .field {
            display: flex;
            flex-direction: column;
            gap: 4px;
            flex: 1 1 100%;
            min-width: 100px;
        }
        @media (min-width: 480px) {
            .violation-form .field {
                flex: 1 1 40%;
                min-width: 120px;
            }
            .violation-form .field.field-checkbox {
                flex: 0 1 auto;
                min-width: 80px;
            }
            .violation-form .field.field-file {
                flex: 0 1 120px;
                min-width: 100px;
            }
        }
        @media (min-width: 640px) {
            .violation-form .field {
                flex: 1;
                min-width: 140px;
            }
            .violation-form .field.field-checkbox {
                flex: 0 1 100px;
            }
            .violation-form .field.field-file {
                flex: 0 1 140px;
            }
        }
        .violation-form .field label {
            font-size: 12px;
            font-weight: 600;
            color: #475569;
        }
        @media (min-width: 640px) {
            .violation-form .field label {
                font-size: 13px;
            }
        }
        .violation-form .field select,
        .violation-form .field input {
            padding: 8px 12px;
            border: 1px solid #d1d9e6;
            border-radius: 10px;
            font-size: 15px;
            outline: none;
            transition: 0.2s;
            background: #fff;
            width: 100%;
            font-size: 16px;
        }
        @media (min-width: 640px) {
            .violation-form .field select,
            .violation-form .field input {
                padding: 8px 14px;
                font-size: 14px;
            }
        }
        .violation-form .field select:focus,
        .violation-form .field input:focus {
            border-color: #2563eb;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.12);
        }
        .violation-form .field-checkbox {
            flex-direction: row;
            align-items: center;
            gap: 8px;
            min-width: 80px;
            flex: 0 1 auto;
        }
        .violation-form .field-checkbox label {
            font-size: 14px;
            font-weight: 600;
            color: #475569;
            cursor: pointer;
        }
        .violation-form .field-checkbox input[type="checkbox"] {
            width: 20px;
            height: 20px;
            accent-color: #2563eb;
            flex-shrink: 0;
        }
        .violation-form .field-file {
            flex: 1 1 100%;
            min-width: 100px;
        }
        @media (min-width: 480px) {
            .violation-form .field-file {
                flex: 0 1 120px;
            }
        }
        .violation-form .field-file label {
            font-size: 12px;
            font-weight: 600;
            color: #475569;
        }
        .violation-form .field-file input[type="file"] {
            padding: 6px 8px;
            border: 1px solid #d1d9e6;
            border-radius: 8px;
            font-size: 13px;
            background: #fff;
            width: 100%;
        }
        .violation-form .btn {
            align-self: flex-end;
            padding: 9px 16px;
            min-height: 44px;
            min-width: 60px;
            flex: 1 1 100%;
            justify-content: center;
        }
        @media (min-width: 480px) {
            .violation-form .btn {
                flex: 0 1 auto;
                padding: 9px 20px;
            }
        }

        .violation-filter {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 8px;
            margin-bottom: 12px;
            padding: 6px 0 10px;
            border-bottom: 1px solid #eef2f6;
        }
        .violation-filter label {
            font-weight: 600;
            font-size: 13px;
            color: #475569;
        }
        .violation-filter select {
            padding: 6px 10px;
            border: 1px solid #d1d9e6;
            border-radius: 8px;
            font-size: 14px;
            outline: none;
            background: #fff;
            min-height: 40px;
            flex: 1 1 120px;
        }
        .violation-filter .search-box {
            display: flex;
            align-items: center;
            gap: 4px;
            flex: 2 1 140px;
            min-width: 120px;
        }
        .violation-filter .search-box input {
            flex: 1;
            padding: 6px 12px;
            border: 1px solid #d1d9e6;
            border-radius: 8px;
            font-size: 15px;
            outline: none;
            background: #fff;
            min-height: 40px;
            min-width: 80px;
        }
        .violation-filter .search-box input:focus {
            border-color: #2563eb;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }
        .violation-filter .search-box .btn-clear {
            background: transparent;
            border: none;
            color: #94a3b8;
            cursor: pointer;
            font-size: 18px;
            padding: 4px 8px;
            min-height: 40px;
            min-width: 40px;
            display: none;
        }
        .violation-filter .search-box .btn-clear.visible {
            display: block;
        }
        .violation-filter .archive-title {
            font-size: 13px;
            color: #64748b;
            width: 100%;
            text-align: left;
            padding-top: 4px;
        }
        @media (min-width: 640px) {
            .violation-filter .archive-title {
                width: auto;
                text-align: right;
                padding-top: 0;
            }
        }

        .violation-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
            max-height: 450px;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            padding-right: 2px;
        }
        @media (min-width: 640px) {
            .violation-list {
                max-height: 500px;
            }
        }
        .violation-item {
            display: flex;
            flex-direction: column;
            padding: 10px 12px;
            background: #ffffff;
            border-radius: 10px;
            border: 1px solid #eef2f6;
            gap: 6px;
        }
        .violation-item .row {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        @media (min-width: 480px) {
            .violation-item .row {
                flex-direction: row;
                justify-content: space-between;
                align-items: center;
                flex-wrap: wrap;
            }
        }
        .violation-item .info {
            display: flex;
            flex-wrap: wrap;
            gap: 6px 12px;
            align-items: center;
            flex: 1;
        }
        .violation-item .info .v-student {
            font-weight: 600;
            color: #0f172a;
            font-size: 14px;
        }
        .violation-item .info .v-student .sid {
            font-weight: 400;
            color: #94a3b8;
            font-size: 12px;
            margin-left: 4px;
        }
        .violation-item .info .v-content {
            color: #334155;
            word-break: break-word;
            font-size: 14px;
        }
        .violation-item .info .v-content .highlight {
            background: #fef08a;
            padding: 0 2px;
            border-radius: 2px;
        }
        .violation-item .info .v-time {
            font-size: 11px;
            color: #94a3b8;
            white-space: nowrap;
        }
        .violation-item .status-badge {
            font-size: 12px;
            font-weight: 600;
            padding: 4px 12px;
            border-radius: 40px;
            cursor: pointer;
            border: 1px solid transparent;
            display: inline-block;
            min-height: 30px;
            line-height: 20px;
            touch-action: manipulation;
        }
        .violation-item .status-badge:active {
            opacity: 0.6;
            transform: scale(0.96);
        }
        .violation-item .status-badge.resolved {
            background: #dcfce7;
            color: #15803d;
            border-color: #86efac;
        }
        .violation-item .status-badge.unresolved {
            background: #fee2e2;
            color: #b91c1c;
            border-color: #fca5a5;
        }
        .violation-item .actions {
            display: flex;
            gap: 4px;
            align-items: center;
            flex-wrap: wrap;
        }
        .violation-item .actions .btn-icon {
            background: transparent;
            border: none;
            font-size: 20px;
            cursor: pointer;
            color: #94a3b8;
            padding: 4px 8px;
            border-radius: 6px;
            min-height: 40px;
            min-width: 40px;
            touch-action: manipulation;
        }
        .violation-item .actions .btn-icon:active {
            background: #e9edf2;
        }
        .violation-item .images {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 4px;
        }
        .violation-item .images .img-thumb {
            position: relative;
            width: 56px;
            height: 56px;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid #e9edf2;
            cursor: pointer;
            flex-shrink: 0;
        }
        @media (min-width: 480px) {
            .violation-item .images .img-thumb {
                width: 60px;
                height: 60px;
            }
        }
        .violation-item .images .img-thumb img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .violation-item .images .img-thumb .del-img {
            position: absolute;
            top: 2px;
            right: 2px;
            background: rgba(0, 0, 0, 0.65);
            color: #fff;
            border: none;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            font-size: 12px;
            line-height: 20px;
            text-align: center;
            cursor: pointer;
        }
        .violation-item .upload-btn {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            font-size: 13px;
            color: #2563eb;
            border: 1px dashed #d1d9e6;
            border-radius: 8px;
            padding: 4px 12px;
            cursor: pointer;
            min-height: 36px;
            touch-action: manipulation;
        }
        .violation-item .upload-btn:active {
            border-color: #2563eb;
            background: #eff6ff;
        }
        .violation-item .upload-btn input[type="file"] {
            display: none;
        }
        .violation-empty {
            text-align: center;
            color: #94a3b8;
            padding: 24px 0;
            font-size: 14px;
        }

        /* ===== 模态框 ===== */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 12px;
            animation: fadeIn 0.25s ease;
        }
        .modal-overlay .modal-content {
            max-width: 98%;
            max-height: 98%;
            background: transparent;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .modal-overlay .modal-content img {
            max-width: 100%;
            max-height: 90vh;
            display: block;
            border-radius: 8px;
            object-fit: contain;
        }
        .modal-overlay .modal-close {
            position: absolute;
            top: 8px;
            right: 8px;
            font-size: 28px;
            color: #fff;
            cursor: pointer;
            background: rgba(0, 0, 0, 0.6);
            width: 44px;
            height: 44px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: none;
            touch-action: manipulation;
        }
        @media (min-width: 640px) {
            .modal-overlay .modal-close {
                top: 12px;
                right: 12px;
                width: 48px;
                height: 48px;
                font-size: 32px;
            }
        }

        /* ===== Tab ===== */
        .tabs {
            display: flex;
            gap: 3px;
            background: #f1f5f9;
            border-radius: 12px;
            padding: 3px;
            margin-bottom: 16px;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }
        @media (min-width: 640px) {
            .tabs {
                gap: 4px;
                border-radius: 14px;
                padding: 4px;
                margin-bottom: 24px;
            }
        }
        .tab-btn {
            flex: 1;
            min-width: 70px;
            padding: 8px 10px;
            border: none;
            background: transparent;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 600;
            color: #64748b;
            cursor: pointer;
            transition: 0.25s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            touch-action: manipulation;
            min-height: 40px;
            white-space: nowrap;
        }
        .tab-btn:active {
            transform: scale(0.96);
        }
        @media (min-width: 640px) {
            .tab-btn {
                min-width: 100px;
                padding: 10px 18px;
                font-size: 15px;
                gap: 8px;
                min-height: 48px;
            }
        }
        .tab-btn.active {
            background: #ffffff;
            color: #2563eb;
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.10);
        }
        .tab-btn .icon {
            font-size: 16px;
        }
        @media (min-width: 640px) {
            .tab-btn .icon {
                font-size: 18px;
            }
        }
        .tab-panel {
            display: none;
            animation: fadeIn 0.3s ease;
        }
        .tab-panel.active {
            display: block;
        }
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(6px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ===== 考勤 ===== */
        .attendance-toolbar {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
            background: #f8fafc;
            padding: 12px 14px;
            border-radius: 12px;
            border: 1px solid #e9edf2;
        }
        @media (min-width: 640px) {
            .attendance-toolbar {
                gap: 14px;
                padding: 14px 18px;

                    <div class="field field-checkbox"><label for="violationResolved">已处理</label><input type="checkbox" id="violationResolved" /></div>
                    <div class="field field-file"><label for="violationImages">📎 图片</label><input type="file" id="violationImages" accept="image/*" multiple /></div>
                    <button class="btn btn-primary" onclick="addViolation()">➕ 记录</button>
                    <button class="btn btn-outline" onclick="refreshViolations()">🔄 刷新</button>
                </div>
                <div class="violation-filter">
                    <label for="archiveFilter">📂 学生：</label>
                    <select id="archiveFilter" onchange="onArchiveFilterChange()"><option value="">全部学生</option></select>
                    <div class="search-box">
                        <input type="text" id="archiveSearch" placeholder="🔍 搜索..." oninput="onSearchChange()" />
                        <button class="btn-clear" id="searchClearBtn" onclick="clearSearch()">✕</button>
                    </div>
                    <span class="archive-title" id="archiveTitle">显示全部记录</span>
                </div>
                <div id="violationList"></div>
            </div>
        </div>

        <!-- ===== Tab ===== -->
        <div class="tabs" id="tabNav">
            <button class="tab-btn active" data-tab="attendance"><span class="icon">✅</span> 考勤打卡</button>
            <button class="tab-btn" data-tab="manage"><span class="icon">👨‍🎓</span> 学生管理</button>
            <button class="tab-btn" data-tab="stats"><span class="icon">📊</span> 违纪统计</button>
        </div>

        <!-- ========================================================= -->
        <!-- TAB 1: 考勤打卡 -->
        <!-- ========================================================= -->
        <div class="tab-panel active" id="panelAttendance">
            <div class="attendance-toolbar">
                <div class="left">
                    <label for="attendanceDate">📅 日期</label>
                    <input type="date" id="attendanceDate" />
                    <button class="btn btn-outline btn-sm" onclick="loadAttendance()">🔄 刷新</button>
                    <span id="attendanceStatus">未打卡</span>
                </div>
                <div><button class="btn btn-success btn-sm" onclick="markAllPresent()">✅ 全部出勤</button></div>
            </div>
            <div id="attendanceGrid" class="student-grid"></div>
            <div id="attendanceEmpty" class="empty-state" style="display:none;">
                <span class="big-icon">👨‍🎓</span><p>暂无学生，请先到「学生管理」添加学生。</p>
            </div>
        </div>

        <!-- ========================================================= -->
        <!-- TAB 2: 学生管理 -->
        <!-- ========================================================= -->
        <div class="tab-panel" id="panelManage">
            <div class="manage-form">
                <div class="field"><label for="studentId">学号</label><input type="text" id="studentId" placeholder="如：2024001" /></div>
                <div class="field"><label for="studentName">姓名</label><input type="text" id="studentName" placeholder="请输入姓名" /></div>
                <div class="field"><label for="studentClass">班级</label><input type="text" id="studentClass" placeholder="如：一年级1班" /></div>
                <button class="btn btn-primary" onclick="addStudentFromForm()">➕ 添加学生</button>
            </div>

            <div class="import-area">
                <span class="import-label">📤 Excel 导入</span>
                <button class="btn btn-primary btn-sm" id="importExcelBtn">📂 选择文件</button>
                <span class="hint">支持 .xlsx / .xls，列顺序：学号、姓名、班级</span>
                <input type="file" id="fileInput" accept=".xlsx,.xls" style="display:none;" />
                <div class="import-result" id="importResult"></div>
            </div>

            <div id="studentListContainer">
                <div class="student-list-header">
                    <span>学号 <button class="btn-sort active" onclick="setSort('studentId')" title="按学号排序">↕ <span class="arrow" id="arrowStudentId">↑</span></button></span>
                    <span>姓名 <button class="btn-sort" onclick="setSort('name')" title="按姓名排序">↕ <span class="arrow" id="arrowName">↑</span></button></span>
                    <span>班级 <button class="btn-sort" onclick="setSort('class')" title="按班级排序">↕ <span class="arrow" id="arrowClass">↑</span></button></span>
                    <span>操作</span>
                </div>
                <div id="studentList" class="student-list"></div>
            </div>
            <div id="manageEmpty" class="empty-state" style="display:none;">
                <span class="big-icon">📭</span><p>还没有学生，快来添加吧！</p>
            </div>
        </div>

        <!-- ========================================================= -->
        <!-- TAB 3: 违纪统计（替代原统计报表） -->
        <!-- ========================================================= -->
        <div class="tab-panel" id="panelStats">
            <div class="stats-toolbar">
                <div class="field">
                    <label for="statsStart">开始</label>
                    <input type="date" id="statsStart" />
                </div>
                <div class="field">
                    <label for="statsEnd">结束</label>
                    <input type="date" id="statsEnd" />
                </div>
                <button class="btn btn-primary btn-sm" onclick="renderStats()">📊 生成排名</button>
                <button class="btn btn-outline btn-sm" onclick="setThisWeek()">📅 本周</button>
                <button class="btn btn-outline btn-sm" onclick="setThisMonth()">📅 本月</button>
            </div>

            <!-- 统计汇总卡片 -->
            <div class="stats-summary" id="statsSummary">
                <div class="item"><div class="num" id="statsTotalViolations">0</div><div class="lbl">📋 总违纪次数</div></div>
                <div class="item"><div class="num" id="statsTotalStudents">0</div><div class="lbl">👨‍🎓 涉及学生数</div></div>
                <div class="item"><div class="num" id="statsTotalTypes">0</div><div class="lbl">📂 违纪类型数</div></div>
                <div class="item"><div class="num" id="statsAvgPerStudent">0</div><div class="lbl">📊 人均违纪次数</div></div>
            </div>

            <!-- 排名结果 -->
            <div id="statsContent">
                <div class="empty-stats">
                    <span class="big-icon">📊</span>
                    <p>请选择日期范围后点击「生成排名」</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast-container" id="toastContainer"></div>

    <!-- 图片预览 -->
    <div id="imageModal" class="modal-overlay" style="display:none;" onclick="closeImageModal(event)">
        <div class="modal-content" onclick="event.stopPropagation()">
            <button class="modal-close" onclick="closeImageModal()">✕</button>
            <img id="modalImage" src="" alt="图片" />
        </div>
    </div>

    <script>
        // ================================================================
        //  数据层
        // ================================================================
        const STORAGE_KEY = 'attendance_system_data';

        function getDefaultData() {
            return { students: [], records: [], violations: [] };
        }

        function loadData() {
            try {
                const raw = localStorage.getItem(STORAGE_KEY);
                if (raw) {
                    const parsed = JSON.parse(raw);
                    if (!parsed.students) parsed.students = [];
                    if (!parsed.records) parsed.records = [];
                    if (!parsed.violations) parsed.violations = [];
                    parsed.violations = parsed.violations.map(v => {
                        if (v.resolved === undefined) v.resolved = false;
                        if (!v.images) v.images = [];
                        return v;
                    });
                    parsed.students = parsed.students.map(s => {
                        if (s.studentId === undefined) s.studentId = '';
                        return s;
                    });
                    return parsed;
                }
            } catch (e) { console.warn('读取数据失败', e); }
            return getDefaultData();
        }

        function saveData(data) {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
        }

        function genId() {
            return Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
        }

        function formatDateTime(d) {
            const date = d instanceof Date ? d : new Date(d);
            const y = date.getFullYear(),
                m = String(date.getMonth() + 1).padStart(2, '0'),
                day = String(date.getDate()).padStart(2, '0');
            const h = String(date.getHours()).padStart(2, '0'),
                min = String(date.getMinutes()).padStart(2, '0');
            return `${y}-${m}-${day} ${h}:${min}`;
        }

        function formatDate(d) {
            const date = d instanceof Date ? d : new Date(d);
            const y = date.getFullYear(),
                m = String(date.getMonth() + 1).padStart(2, '0'),
                day = String(date.getDate()).padStart(2, '0');
            return `${y}-${m}-${day}`;
        }

        function todayStr() { return formatDate(new Date()); }

        function getWeekday(dateStr) {
            const d = new Date(dateStr + 'T00:00:00');
            return ['日', '一', '二', '三', '四', '五', '六'][d.getDay()];
        }

        function friendlyDate(dateStr) {
            const d = new Date(dateStr + 'T00:00:00');
            return `${d.getMonth()+1}月${d.getDate()}日 周${getWeekday(dateStr)}`;
        }

        let data = loadData();

        // ===== 排序状态 =====
        let sortField = 'studentId';
        let sortAsc = true;

        // ================================================================
        //  Toast
        // ================================================================
        function showToast(message, type = 'info', duration = 2200) {
            const container = document.getElementById('toastContainer');
            const el = document.createElement('div');
            el.className = `toast ${type}`;
            el.textContent = message;
            container.appendChild(el);
            setTimeout(() => {
                el.classList.add('toast-out');
                setTimeout(() => el.remove(), 300);
            }, duration);
        }

        // ================================================================
        //  图片预览
        // ================================================================
        function openImageModal(src) {
            document.getElementById('modalImage').src = src;
            document.getElementById('imageModal').style.display = 'flex';
        }

        function closeImageModal(e) {
            if (e && e.target !== e.currentTarget) return;
            document.getElementById('imageModal').style.display = 'none';
        }
        document.getElementById('imageModal').addEventListener('click', function(e) {
            if (e.target === this) closeImageModal();
        });

        // ================================================================
        //  导出/导入
        // ================================================================
        function exportData() {
            const currentData = loadData();
            const total = currentData.students ? currentData.students.length : 0;
            if (total === 0) { showToast('⚠️ 没有数据可导出', 'error'); return; }
            const json = JSON.stringify(currentData, null, 2);
            const blob = new Blob([json], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `考勤备份_${todayStr()}.json`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            showToast(`✅ 导出成功：${total} 名学生`, 'success');
        }

        function importData() {
            const currentData = loadData();
            if (currentData.students && currentData.students.length > 0) {
                if (!confirm('⚠️ 导入将覆盖当前所有数据，确定继续吗？')) return;
            }
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = '.json';
            input.onchange = function(e) {
                const file = e.target.files[0];
                if (!file) return;
                if (file.size > 10 * 1024 * 1024) { showToast('❌ 文件超过10MB', 'error'); return; }
                const reader = new FileReader();
                reader.onload = function(ev) {
                    try {
                        const imported = JSON.parse(ev.target.result);
                        if (!imported.students || !Array.isArray(imported.students)) {
                            showToast('❌ 文件格式无效', 'error');
                            return;
                        }
                        if (!imported.records || !Array.isArray(imported.records)) { showToast('❌ 缺少 records', 'error');
                            return; }
                        if (!imported.violations || !Array.isArray(imported.violations)) { showToast('❌ 缺少 violations',
                                'error'); return; }
                        imported.students = imported.students.map(s => {
                            if (s.studentId === undefined) s.studentId = '';
                            return s;
                        });
                        const count = imported.students.length;
                        if (!confirm(`将恢复 ${count} 名学生，确定吗？`)) return;
                        data = imported;
                        saveData(data);
                        refreshAll();
                        showToast(`✅ 恢复成功：${count} 名学生`, 'success');
                    } catch (err) {
                        showToast('❌ 解析失败：' + err.message, 'error');
                    }
                };
                reader.readAsText(file);
            };
            input.click();
        }

        // ================================================================
        //  核心业务
        // ================================================================
        function getStudents() {
            return [...data.students].sort((a, b) => a.createdAt - b.createdAt);
        }

        function getSortedStudents() {
            const students = getStudents();
            return students.sort((a, b) => {
                let valA, valB;
                switch (sortField) {
                    case 'studentId':
                        valA = (a.studentId || '').toString();
                        valB = (b.studentId || '').toString();
                        const numA = parseFloat(valA),
                            numB = parseFloat(valB);
                        if (!isNaN(numA) && !isNaN(numB)) {
                            return sortAsc ? numA - numB : numB - numA;
                        }
                        break;
                    case 'name':
                        valA = a.name || '';
                        valB = b.name || '';
                        break;
                    case 'class':
                        valA = a.class || '';
                        valB = b.class || '';
                        break;
                    default:
                        valA = a.studentId || '';
                        valB = b.studentId || '';
                }
                if (typeof valA === 'string' && typeof valB === 'string') {
                    return sortAsc ? valA.localeCompare(valB, 'zh-Hans-CN') : valB.localeCompare(valA, 'zh-Hans-CN');
                }
                return 0;
            });
        }

        function getAttendanceMap(dateStr) {
            const map = {};
            data.records.filter(r => r.date === dateStr).forEach(r => { map[r.studentId] = r.status; });
            return map;
        }

        function getStudentRecords(studentId) {
            return data.records.filter(r => r.studentId === studentId);
        }

        function getStudentRecordsInRange(studentId, startDate, endDate) {
            return data.records.filter(r => r.studentId === studentId && r.date >= startDate && r.date <= endDate);
        }

        function setAttendance(studentId, dateStr, status) {
            if (!status) {
                data.records = data.records.filter(r => !(r.studentId === studentId && r.date === dateStr));
                saveData(data);
                return;
            }
            const existing = data.records.find(r => r.studentId === studentId && r.date === dateStr);
            if (existing) { existing.status = status; } else {
                data.records.push({ id: genId(), studentId, date: dateStr, status });
            }
            saveData(data);
        }

        function addStudent(studentId, name, className) {
            if (!name || !name.trim()) return { success: false, message: '姓名不能为空' };
            const trimmedName = name.trim();
            const trimmedClass = (className || '未分班').trim() || '未分班';
            const sid = (studentId || '').trim();
            if (sid) {
                const exist = data.students.some(s => s.studentId === sid);
                if (exist) return { success: false, message: `学号 "${sid}" 已存在` };
            }
            const exist = data.students.some(s => s.name === trimmedName && s.class === trimmedClass);
            if (exist) return { success: false, message: `学生 "${trimmedName}"（${trimmedClass}）已存在` };
            data.students.push({
                id: genId(),
                studentId: sid,
                name: trimmedName,
                class: trimmedClass,
                createdAt: Date.now()
            });
            saveData(data);
            return { success: true, message: `已添加：${trimmedName}` };
        }

        function deleteStudent(studentId) {
            const student = data.students.find(s => s.id === studentId);
            if (!student) return;
            if (!confirm(`确定要删除学生 "${student.name}" 吗？`)) return;
            data.students = data.students.filter(s => s.id !== studentId);
            data.records = data.records.filter(r => r.studentId !== studentId);
            data.violations = data.violations.filter(v => v.studentId !== studentId);
            saveData(data);
            showToast(`已删除：${student.name}`, 'info');
            refreshAll();
        }

        function resetAllData() {
            if (!confirm('⚠️ 确定要清除所有数据吗？')) return;
            if (!confirm('再次确认：所有数据将被删除！')) return;
            data = getDefaultData();
            saveData(data);
            showToast('已重置所有数据', 'info');
            refreshAll();
        }

        // ================================================================
        //  排序切换
        // ================================================================
        function setSort(field) {
            if (sortField === field) { sortAsc = !sortAsc; } else { sortField = field;
                sortAsc = true; }
            updateSortArrows();
            renderStudentList();
        }

        function updateSortArrows() {
            const fields = ['studentId', 'name', 'class'];
            fields.forEach(f => {
                const arrow = document.getElementById(`arrow${f.charAt(0).toUpperCase() + f.slice(1)}`);
                if (arrow) {
                    if (sortField === f) {
                        arrow.textContent = sortAsc ? '↑' : '↓';
                        arrow.className = 'arrow' + (sortAsc ? '' : ' desc');
                        const btn = arrow.closest('.btn-sort');
                        if (btn) btn.classList.add('active');
                    } else {
                        arrow.textContent = '↑';
                        arrow.className = 'arrow';
                        const btn = arrow.closest('.btn-sort');
                        if (btn) btn.classList.remove('active');
                    }
                }
            });
        }

        // ================================================================
        //  违纪相关
        // ================================================================
        function getViolations() {
            return [...data.violations].sort((a, b) => new Date(b.date) - new Date(a.date));
        }

        function getViolationsByStudent(studentId) {
            return data.violations.filter(v => v.studentId === studentId).sort((a, b) => new Date(b.date) - new Date(a.date));
        }

        function getViolationsInRange(startDate, endDate) {
            return data.violations.filter(v => v.date >= startDate && v.date <= endDate);
        }

        function addViolationRecord(studentId, content, resolved, images) {
            if (!studentId) { showToast('请选择学生', 'error'); return false; }
            if (!content || !content.trim()) { showToast('请输入违纪内容', 'error'); return false; }
            const student = data.students.find(s => s.id === studentId);
            if (!student) { showToast('所选学生不存在', 'error'); return false; }
            data.violations.push({
                id: genId(),
                studentId,
                content: content.trim(),
                date: new Date().toISOString(),
                resolved: !!resolved,
                images: images || []
            });
            saveData(data);
            showToast(`已记录 ${student.name} 的违纪`, 'success');
            refreshViolationsUI();
            return true;
        }

        function deleteViolation(violationId) {
            if (!confirm('确定删除这条违纪记录吗？')) return;
            data.violations = data.violations.filter(v => v.id !== violationId);
            saveData(data);
            refreshViolationsUI();
            showToast('已删除', 'info');
        }

        function toggleResolved(violationId) {
            const v = data.violations.find(item => item.id === violationId);
            if (!v) return;
            v.resolved = !v.resolved;
            saveData(data);
            refreshViolationsUI();
            showToast(v.resolved ? '已标记为已处理' : '已标记为未处理', 'info');
        }

        function addImagesToViolation(violationId, files) {
            const v = data.violations.find(item => item.id === violationId);
            if (!v) { showToast('记录不存在', 'error'); return; }
            if (!files || files.length === 0) return;
            const readers = [];
            let loaded = 0;
            for (let i = 0; i < files.length; i++) {
                const file = files[i];
                if (!file.type.startsWith('image/')) { showToast(`${file.name} 不是图片`, 'error'); continue; }
                const reader = new FileReader();
                readers.push(new Promise((resolve) => {
                    reader.onload = function(e) { v.images.push(e.target.result);
                        loaded++;
                        resolve(); };
                    reader.readAsDataURL(file);
                }));
            }
            Promise.all(readers).then(() => {
                if (loaded > 0) { saveData(data);
                    refreshViolationsUI();
                    showToast(`添加 ${loaded} 张图片`, 'success'); }
            }).catch(err => { showToast('图片读取失败', 'error');
                console.error(err); });
        }

        function deleteImage(violationId, index) {
            const v = data.violations.find(item => item.id === violationId);
            if (!v) return;
            if (!confirm('删除这张图片？')) return;
            v.images.splice(index, 1);
            saveData(data);
            refreshViolationsUI();
            showToast('已删除图片', 'info');
        }

        function renderViolationSelect() {
            const select = document.getElementById('violationStudent');
            const students = getSortedStudents();
            select.innerHTML = '<option value="">-- 请选择学生 --</option>';
            students.forEach(s => {
                const opt = document.createElement('option');
                opt.value = s.id;
                opt.textContent = `${s.studentId || ''} ${s.name}（${s.class}）`.trim();
                select.appendChild(opt);
            });
        }

        function renderArchiveFilter() {
            const select = document.getElementById('archiveFilter');
            const students = getSortedStudents();
            const currentVal = select.value;
            select.innerHTML = '<option value="">全部学生</option>';
            students.forEach(s => {
                const opt = document.createElement('option');
                opt.value = s.id;
                opt.textContent = `${s.studentId || ''} ${s.name}（${s.class}）`.trim();
                select.appendChild(opt);
            });
            if (currentVal && students.some(s => s.id === currentVal)) select.value = currentVal;
            else select.value = '';
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function highlightText(text, keyword) {
            if (!keyword || !text) return escapeHtml(text);
            const escaped = escapeHtml(text);
            const kw = escapeHtml(keyword);
            const regex = new RegExp(`(${kw.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi');
            return escaped.replace(regex, '<span class="highlight">$1</span>');
        }

        function renderViolationList(filterStudentId, searchKeyword) {
            const container = document.getElementById('violationList');
            let violations = getViolations();
            if (filterStudentId) violations = violations.filter(v => v.studentId === filterStudentId);
            if (searchKeyword && searchKeyword.trim()) {
                const kw = searchKeyword.trim().toLowerCase();
                const students = getStudents();
                const studentMap = {};
                students.forEach(s => { studentMap[s.id] = s; });
                violations = violations.filter(v => {
                    const student = studentMap[v.studentId];
                    const name = student ? student.name.toLowerCase() : '';
                    const sid = student ? (student.studentId || '').toLowerCase() : '';
                    const cls = student ? student.class.toLowerCase() : '';
                    const content = v.content.toLowerCase();
                    return name.includes(kw) || sid.includes(kw) || cls.includes(kw) || content.includes(kw);
                });
            }
            if (violations.length === 0) {
                container.innerHTML = `<div class="violation-empty">📭 暂无匹配记录</div>`;
                return;
            }
            const students = getStudents();
            const studentMap = {};
            students.forEach(s => { studentMap[s.id] = s; });
            let html = '<div class="violation-list">';
            violations.forEach(v => {
                const student = studentMap[v.studentId];
                const name = student ? student.name : '（已删除）';
                const sid = student ? (student.studentId || '') : '';
                const cls = student ? student.class : '';
                const time = formatDateTime(v.date);
                const displaySid = searchKeyword ? highlightText(sid, searchKeyword) : escapeHtml(sid);
                const displayName = searchKeyword ? highlightText(name, searchKeyword) : escapeHtml(name);
                const displayCls = searchKeyword && cls ? highlightText(cls, searchKeyword) : escapeHtml(cls);
                const displayContent = searchKeyword ? highlightText(v.content, searchKeyword) : escapeHtml(v.content);
                const statusLabel = v.resolved ? '✅ 已处理' : '⏳ 未处理';

        function addViolation() {
            const select = document.getElementById('violationStudent');
            const content = document.getElementById('violationContent');
            const resolved = document.getElementById('violationResolved').checked;
            const fileInput = document.getElementById('violationImages');
            const files = fileInput.files;
            const studentId = select.value;
            const text = content.value;
            if (files && files.length > 0) {
                const readers = [];
                const imageData = [];
                let hasError = false;
                for (let i = 0; i < files.length; i++) {
                    const file = files[i];
                    if (!file.type.startsWith('image/')) { showToast(`${file.name} 不是图片`, 'error');
                        hasError = true; break; }
                    const reader = new FileReader();
                    readers.push(new Promise((resolve) => {
                        reader.onload = function(e) { imageData.push(e.target.result);
                            resolve(); };
                        reader.readAsDataURL(file);
                    }));
                }
                if (hasError) return;
                Promise.all(readers).then(() => {
                    const success = addViolationRecord(studentId, text, resolved, imageData);
                    if (success) { content.value = '';
                        document.getElementById('violationResolved').checked = false;
                        fileInput.value = ''; }
                }).catch(err => { showToast('图片读取失败', 'error');
                    console.error(err); });
            } else {
                const success = addViolationRecord(studentId, text, resolved, []);
                if (success) { content.value = '';
                    document.getElementById('violationResolved').checked = false;
                    fileInput.value = ''; }
            }
        }

        // ================================================================
        //  Excel 导入
        // ================================================================
        function importExcel(file) {
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const arrayBuffer = e.target.result;
                    const workbook = XLSX.read(arrayBuffer, { type: 'array' });
                    const firstSheet = workbook.Sheets[workbook.SheetNames[0]];
                    const json = XLSX.utils.sheet_to_json(firstSheet, { header: 1 });
                    let startRow = 0;
                    if (json.length > 0) {
                        const firstRow = json[0];
                        if (firstRow && firstRow.length > 0) {
                            const firstCell = String(firstRow[0] || '').toLowerCase();
                            if (firstCell.includes('学号') || firstCell.includes('姓名') || firstCell.includes('名字')) {
                                startRow = 1;
                            }
                        }
                    }
                    let added = 0,
                        skipped = 0;
                    const students = getStudents();
                    const existingSet = new Set(students.map(s => `${s.studentId || ''}|${s.name}|${s.class}`));
                    for (let i = startRow; i < json.length; i++) {
                        const row = json[i];
                        if (!row || row.length === 0) continue;
                        let sid = String(row[0] || '').trim();
                        let name = String(row[1] || '').trim();
                        let cls = String(row[2] || '').trim() || '未分班';
                        if (!name) continue;
                        const key = `${sid}|${name}|${cls}`;
                        if (existingSet.has(key)) { skipped++; continue; }
                        if (sid) {
                            const existSid = students.some(s => s.studentId === sid);
                            if (existSid) { skipped++; continue; }
                        }
                        data.students.push({
                            id: genId(),
                            studentId: sid,
                            name: name,
                            class: cls,
                            createdAt: Date.now()
                        });
                        existingSet.add(key);
                        added++;
                        students.push({ studentId: sid, name, class: cls });
                    }
                    saveData(data);
                    refreshAll();
                    document.getElementById('importResult').textContent = `✅ 导入成功：新增 ${added} 名，跳过 ${skipped} 名`;
                    showToast(`导入完成：新增 ${added} 人`, 'success');
                } catch (err) {
                    showToast('文件解析失败：' + err.message, 'error');
                    document.getElementById('importResult').textContent = `❌ 导入失败：${err.message}`;
                }
            };
            reader.readAsArrayBuffer(file);
        }

        // ================================================================
        //  违纪统计排名（核心新功能）
        // ================================================================
        function renderStats() {
            const startInput = document.getElementById('statsStart');
            const endInput = document.getElementById('statsEnd');
            let start = startInput.value;
            let end = endInput.value;

            if (!start || !end) {
                const today = new Date();
                const sevenAgo = new Date(today);
                sevenAgo.setDate(today.getDate() - 6);
                start = formatDate(sevenAgo);
                end = formatDate(today);
                startInput.value = start;
                endInput.value = end;
            }

            // 获取日期范围内的所有违纪记录
            const allViolations = getViolationsInRange(start, end);

            if (allViolations.length === 0) {
                document.getElementById('statsContent').innerHTML = `
                    <div class="empty-stats">
                        <span class="big-icon">📭</span>
                        <p>在 ${friendlyDate(start)} 至 ${friendlyDate(end)} 期间暂无违纪记录</p>
                    </div>
                `;
                document.getElementById('statsTotalViolations').textContent = '0';
                document.getElementById('statsTotalStudents').textContent = '0';
                document.getElementById('statsTotalTypes').textContent = '0';
                document.getElementById('statsAvgPerStudent').textContent = '0';
                return;
            }

            // ---- 统计汇总 ----
            const totalViolations = allViolations.length;
            const studentMap = {};
            const contentMap = {};

            allViolations.forEach(v => {
                // 按内容分组
                const key = v.content.trim();
                if (!contentMap[key]) {
                    contentMap[key] = { content: key, count: 0, studentIds: [] };
                }
                contentMap[key].count++;
                // 记录涉及的学生（去重）
                if (!contentMap[key].studentIds.includes(v.studentId)) {
                    contentMap[key].studentIds.push(v.studentId);
                }
                // 统计涉及学生总数
                if (!studentMap[v.studentId]) {
                    studentMap[v.studentId] = true;
                }
            });

            const totalStudents = Object.keys(studentMap).length;
            const totalTypes = Object.keys(contentMap).length;
            const avgPerStudent = totalStudents > 0 ? (totalViolations / totalStudents).toFixed(1) : '0';

            document.getElementById('statsTotalViolations').textContent = totalViolations;
            document.getElementById('statsTotalStudents').textContent = totalStudents;
            document.getElementById('statsTotalTypes').textContent = totalTypes;
            document.getElementById('statsAvgPerStudent').textContent = avgPerStudent;

            // ---- 按次数排名 ----
            const sorted = Object.values(contentMap).sort((a, b) => b.count - a.count);

            // 获取学生姓名映射
            const students = getStudents();
            const studentNameMap = {};
            students.forEach(s => { studentNameMap[s.id] = s; });

            // ---- 生成HTML ----
            let html = `
                <div style="margin-bottom:16px;font-weight:600;font-size:15px;color:#0f172a;">
                    🏆 违纪行为排名（${friendlyDate(start)} ~ ${friendlyDate(end)}）
                </div>
                <div class="stats-table-wrap">
                    <table class="stats-table">
                        <thead>
                            <tr>
                                <th style="width:50px;">排名</th>
                                <th style="min-width:120px;">违纪内容</th>
                                <th style="width:80px;">次数</th>
                                <th style="width:120px;">占比</th>
                                <th>涉及学生</th>
                            </tr>
                        </thead>
                        <tbody>
            `;

            if (sorted.length === 0) {
                html += `<tr><td colspan="5" style="text-align:center;color:#94a3b8;padding:30px 0;">暂无数据</td></tr>`;
            } else {
                sorted.forEach((item, index) => {
                    const rank = index + 1;
                    const percentage = totalViolations > 0 ? Math.round((item.count / totalViolations) * 100) : 0;
                    let rankClass = '';
                    if (rank === 1) rankClass = 'gold';
                    else if (rank === 2) rankClass = 'silver';
                    else if (rank === 3) rankClass = 'bronze';

                    // 进度条颜色
                    let barClass = 'low';
                    if (percentage > 30) barClass = 'high';
                    else if (percentage > 15) barClass = 'mid';

                    // 涉及学生标签
                    let studentTags = '';
                    if (item.studentIds.length > 0) {
                        const tags = item.studentIds.map(sid => {
                            const student = studentNameMap[sid];
                            if (!student) return '';
                            const displayName = escapeHtml(student.name);
                            return `<span class="student-tag" onclick="viewStudentViolation('${sid}')" title="查看 ${displayName} 的违纪档案">${displayName}</span>`;
                        }).filter(t => t);
                        studentTags = `<div class="student-tags">${tags.join('')}</div>`;
                    } else {
                        studentTags = '<span style="color:#94a3b8;">—</span>';
                    }

                    html += `
                        <tr>
                            <td class="rank ${rankClass}">#${rank}</td>
                            <td class="content-cell"><strong>${escapeHtml(item.content)}</strong></td>
                            <td style="font-weight:600;color:#2563eb;">${item.count}</td>
                            <td>
                                <div class="rate-bar">
                                    <div class="fill ${barClass}" style="width:${percentage}%;"></div>
                                </div>
                                ${percentage}%
                            </td>
                            <td>${studentTags}</td>
                        </tr>
                    `;
                });
            }

            html += `
                        </tbody>
                    </table>
                </div>
                <div style="margin-top:12px;font-size:13px;color:#94a3b8;text-align:right;">
                    共 ${totalViolations} 条违纪记录，涉及 ${totalStudents} 名学生
                </div>
            `;

            document.getElementById('statsContent').innerHTML = html;
        }

        function setThisWeek() {

            const day = today.getDay();
            const diff = today.getDate() - day + (day === 0 ? -6 : 1);
            const monday = new Date(today);
            monday.setDate(diff);
            const sunday = new Date(monday);
            sunday.setDate(monday.getDate() + 6);
            document.getElementById('statsStart').value = formatDate(monday);
            document.getElementById('statsEnd').value = formatDate(sunday);
            renderStats();
        }

            const today = new Date();
            const first = new Date(today.getFullYear(), today.getMonth(), 1);
            const last = new Date(today.getFullYear(), today.getMonth() + 1, 0);
            document.getElementById('statsStart').value = formatDate(first);
            document.getElementById('statsEnd').value = formatDate(last);
            renderStats();
        }

        function updateStats() {
            const students = getStudents();
            document.getElementById('totalStudents').textContent = students.length;
            const today = document.getElementById('attendanceDate').value || todayStr();
            const map = getAttendanceMap(today);
            const present = Object.values(map).filter(v => v === 'present').length;
            const absent = Object.values(map).filter(v => v === 'absent').length;
            const marked = Object.keys(map).length;
            const rate = marked > 0 ? Math.round((present / marked) * 100) : 0;
            document.getElementById('todayPresent').textContent = present;
            document.getElementById('todayAbsent').textContent = absent;
            document.getElementById('todayRate').textContent = marked > 0 ? `${rate}%` : '—';
        }

        function renderAttendance() {
            const container = document.getElementById('attendanceGrid');
            const empty = document.getElementById('attendanceEmpty');
            const students = getSortedStudents();
            const dateStr = document.getElementById('attendanceDate').value || todayStr();
            const map = getAttendanceMap(dateStr);
            const markedCount = Object.keys(map).length;
            const statusEl = document.getElementById('attendanceStatus');
            if (markedCount === 0) {
                statusEl.textContent = '📌 今日尚未打卡';
                statusEl.style.color = '#94a3b8';
            } else {
                const present = Object.values(map).filter(v => v === 'present').length;
                const absent = Object.values(map).filter(v => v === 'absent').length;
                const leave = Object.values(map).filter(v => v === 'leave').length;
                statusEl.textContent = `✅ ${present} 出勤  ❌ ${absent} 缺勤  📋 ${leave} 请假  （共 ${markedCount} 人）`;
                statusEl.style.color = '#334155';
            }
            if (students.length === 0) { container.innerHTML = '';
                empty.style.display = 'block'; return; }
            empty.style.display = 'none';
            let html = '';
            students.forEach(student => {
                const status = map[student.id] || '';
                const isPresent = status === 'present',
                    isAbsent = status === 'absent',
                    isLeave = status === 'leave';
                const sidDisplay = student.studentId ? `<span class="sid">#${escapeHtml(student.studentId)}</span>` : '';
                html += `
                    <div class="student-card">
                        <div class="info">
                            <span class="name">${escapeHtml(student.name)} ${sidDisplay}</span>
                            <span class="class-tag">${escapeHtml(student.class)}</span>
                        </div>
                        <div class="status-btns">
                            <button class="btn ${isPresent ? 'active-present' : ''}" onclick="setAttendanceStatus('${student.id}','present')">✅ 出勤</button>
                            <button class="btn ${isAbsent ? 'active-absent' : ''}" onclick="setAttendanceStatus('${student.id}','absent')">❌ 缺勤</button>
                            <button class="btn ${isLeave ? 'active-leave' : ''}" onclick="setAttendanceStatus('${student.id}','leave')">📋 请假</button>
                        </div>
                    </div>
                `;
            });
            container.innerHTML = html;
        }

        function setAttendanceStatus(studentId, status) {
            const dateStr = document.getElementById('attendanceDate').value || todayStr();
            const student = data.students.find(s => s.id === studentId);
            if (!student) return;
            const map = getAttendanceMap(dateStr);
            if (map[studentId] === status) {
                setAttendance(studentId, dateStr, null);
                showToast(`已取消 ${student.name} 的标记`, 'info');
            } else {
                setAttendance(studentId, dateStr, status);
                const statusMap = { present: '出勤', absent: '缺勤', leave: '请假' };
                showToast(`${student.name}：${statusMap[status]} ✅`, 'success');
            }
            refreshAll();
        }
