<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>📚 学生考勤管理系统（含违纪档案）</title>
    <!-- 引入 SheetJS 用于解析 Excel -->
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js">
    </script>
    <style>
        /* ========== 全局重置 & 基础样式 ========== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        /* 触摸优化：消除点击延迟 */
        * {
            touch-action: manipulation;
        }

        body {
            font-family: -apple-system, 'Segoe UI', 'PingFang SC', Roboto, 'Helvetica Neue', sans-serif;
            background: #f0f4f8;
            color: #1e293b;
            min-height: 100vh;
            padding: 12px;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            /* 防止iOS/Android缩放 */
            text-size-adjust: 100%;
            -webkit-text-size-adjust: 100%;
        }

        /* ========== 容器 ========== */
        .app-container {
            max-width: 1100px;
            margin: 0 auto;
            background: #ffffff;
            border-radius: 20px;
            box-shadow: 0 8px 40px rgba(0, 20, 40, 0.06);
            overflow: hidden;
            padding: 16px 16px 32px;
        }

        @media (min-width: 640px) {
            .app-container {
                padding: 28px 32px 40px;
                border-radius: 24px;
            }
            body {
                padding: 20px;
            }
        }

        /* ========== 头部 ========== */
        .app-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            padding-bottom: 16px;
            border-bottom: 2px solid #eef2f6;
            margin-bottom: 16px;
        }

        @media (min-width: 640px) {
            .app-header {
                padding-bottom: 24px;
                margin-bottom: 24px;
                gap: 16px;
            }
        }

        .app-header h1 {
            font-size: 20px;
            font-weight: 700;
            background: linear-gradient(135deg, #2563eb, #7c3aed);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .app-header h1 span {
            font-size: 24px;
            -webkit-text-fill-color: initial;
        }

        @media (min-width: 640px) {
            .app-header h1 {
                font-size: 26px;
            }
            .app-header h1 span {
                font-size: 28px;
            }
        }

        .header-actions {
            display: flex;
            gap: 8px;
            align-items: center;
            flex-wrap: wrap;
        }

        .header-date {
            font-size: 12px;
            color: #64748b;
            background: #f1f5f9;
            padding: 4px 12px;
            border-radius: 40px;
            font-weight: 500;
            white-space: nowrap;
        }

        @media (min-width: 640px) {
            .header-date {
                font-size: 14px;
                padding: 6px 16px;
            }
        }

        /* ========== 统计概览卡片 ========== */
        .stats-row {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-bottom: 16px;
        }

        @media (min-width: 480px) {
            .stats-row {
                grid-template-columns: repeat(4, 1fr);
                gap: 12px;
            }
        }

        @media (min-width: 640px) {
            .stats-row {
                gap: 16px;
                margin-bottom: 20px;
            }
        }

        .stat-card {
            background: #f8fafc;
            border-radius: 14px;
            padding: 12px 10px;
            text-align: center;
            border: 1px solid #e9edf2;
            transition: 0.2s;
            min-height: 72px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .stat-card .number {
            font-size: 22px;
            font-weight: 700;
            color: #0f172a;
            line-height: 1.2;
        }

        .stat-card .label {
            font-size: 11px;
            color: #64748b;
            margin-top: 2px;
            font-weight: 500;
        }

        @media (min-width: 480px) {
            .stat-card .number {
                font-size: 26px;
            }
            .stat-card .label {
                font-size: 13px;
            }
        }

        @media (min-width: 640px) {
            .stat-card {
                padding: 16px 18px;
                min-height: 88px;
            }
            .stat-card .number {
                font-size: 28px;
            }
        }

        .stat-card.accent .number {
            color: #2563eb;
        }
        .stat-card.green .number {
            color: #16a34a;
        }
        .stat-card.orange .number {
            color: #ea580c;
        }
        .stat-card.purple .number {
            color: #7c3aed;
        }

        /* ========== 违纪记录折叠面板 ========== */
        .violation-section {
            margin-bottom: 16px;
            border: 1px solid #e9edf2;
            border-radius: 14px;
            background: #fafcfd;
            overflow: hidden;
            transition: 0.2s;
        }

        .violation-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            cursor: pointer;
            font-weight: 600;
            font-size: 15px;
            color: #1e293b;
            user-select: none;
            background: #f8fafc;
            transition: 0.2s;
            min-height: 48px;
            -webkit-tap-highlight-color: transparent;
        }

        .violation-header:active {
            background: #eef2f6;
        }

        @media (min-width: 640px) {
            .violation-header {
                padding: 14px 20px;
                font-size: 16px;
                min-height: 56px;
            }
        }

        .violation-header .arrow {
            transition: transform 0.25s;
            font-size: 14px;
            color: #94a3b8;
        }

        .violation-header .arrow.open {
            transform: rotate(90deg);
        }

        .violation-panel {
            padding: 12px 14px 16px;
            border-top: 1px solid #e9edf2;
            animation: fadeIn 0.25s ease;
        }

        @media (min-width: 640px) {
            .violation-panel {
                padding: 16px 20px 20px;
            }
        }

        /* ========== 违纪表单 ========== */
        .violation-form {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: flex-end;
            margin-bottom: 12px;
        }

        .violation-form .field {
            display: flex;
            flex-direction: column;
            gap: 4px;
            flex: 1 1 100%;
            min-width: 100px;
        }

        @media (min-width: 480px) {
            .violation-form .field {
                flex: 1 1 40%;
                min-width: 120px;
            }
            .violation-form .field.field-checkbox {
                flex: 0 1 auto;
                min-width: 80px;
            }
            .violation-form .field.field-file {
                flex: 0 1 120px;
                min-width: 100px;
            }
        }

        @media (min-width: 640px) {
            .violation-form .field {
                flex: 1;
                min-width: 140px;
            }
            .violation-form .field.field-checkbox {
                flex: 0 1 100px;
            }
            .violation-form .field.field-file {
                flex: 0 1 140px;
            }
        }

        .violation-form .field label {
            font-size: 12px;
            font-weight: 600;
            color: #475569;
        }

        @media (min-width: 640px) {
            .violation-form .field label {
                font-size: 13px;
            }
        }

        .violation-form .field select,
        .violation-form .field input {
            padding: 8px 12px;
            border: 1px solid #d1d9e6;
            border-radius: 10px;
            font-size: 15px;
            outline: none;
            transition: 0.2s;
            background: #fff;
            width: 100%;
            /* 安卓上防止自动缩放 */
            font-size: 16px;
        }

        @media (min-width: 640px) {
            .violation-form .field select,
            .violation-form .field input {
                padding: 8px 14px;
                font-size: 14px;
            }
        }

        .violation-form .field select:focus,
        .violation-form .field input:focus {
            border-color: #2563eb;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.12);
        }

        .violation-form .field-checkbox {
            flex-direction: row;
            align-items: center;
            gap: 8px;
            min-width: 80px;
            flex: 0 1 auto;
        }

        .violation-form .field-checkbox label {
            font-size: 14px;
            font-weight: 600;
            color: #475569;
            cursor: pointer;
        }

        .violation-form .field-checkbox input[type="checkbox"] {
            width: 20px;
            height: 20px;
            cursor: pointer;
            accent-color: #2563eb;
            flex-shrink: 0;
        }

        .violation-form .field-file {
            flex: 1 1 100%;
            min-width: 100px;
        }

        @media (min-width: 480px) {
            .violation-form .field-file {
                flex: 0 1 120px;
            }
        }

        .violation-form .field-file label {
            font-size: 12px;
            font-weight: 600;
            color: #475569;
        }

        .violation-form .field-file input[type="file"] {
            padding: 6px 8px;
            border: 1px solid #d1d9e6;
            border-radius: 8px;
            font-size: 13px;
            background: #fff;
            width: 100%;
        }

        .violation-form .btn {
            align-self: flex-end;
            padding: 9px 16px;
            min-height: 44px;
            min-width: 60px;
            flex: 1 1 100%;
            justify-content: center;
        }

        @media (min-width: 480px) {
            .violation-form .btn {
                flex: 0 1 auto;
                padding: 9px 20px;
            }
        }

        /* ========== 筛选搜索 ========== */
        .violation-filter {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 8px;
            margin-bottom: 12px;
            padding: 6px 0 10px;
            border-bottom: 1px solid #eef2f6;
        }

        .violation-filter label {
            font-weight: 600;
            font-size: 13px;
            color: #475569;
        }

        .violation-filter select {
            padding: 6px 10px;
            border: 1px solid #d1d9e6;
            border-radius: 8px;
            font-size: 14px;
            outline: none;
            background: #fff;
            min-height: 40px;
            flex: 1 1 120px;
        }

        .violation-filter .search-box {
            display: flex;
            align-items: center;
            gap: 4px;
            flex: 2 1 140px;
            min-width: 120px;
        }

        .violation-filter .search-box input {
            flex: 1;
            padding: 6px 12px;
            border: 1px solid #d1d9e6;
            border-radius: 8px;
            font-size: 15px;
            outline: none;
            background: #fff;
            transition: 0.2s;
            min-width: 80px;
            min-height: 40px;
        }

        .violation-filter .search-box input:focus {
            border-color: #2563eb;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        .violation-filter .search-box .btn-clear {
            background: transparent;
            border: none;
            color: #94a3b8;
            cursor: pointer;
            font-size: 18px;
            padding: 4px 8px;
            min-height: 40px;
            min-width: 40px;
            display: none;
            touch-action: manipulation;
        }

        .violation-filter .search-box .btn-clear.visible {
            display: block;
        }

        .violation-filter .search-box .btn-clear:hover {
            color: #dc2626;
        }

        .violation-filter .archive-title {
            font-size: 13px;
            color: #64748b;
            margin-left: auto;
            white-space: nowrap;
            width: 100%;
            text-align: left;
            padding-top: 4px;
        }

        @media (min-width: 640px) {
            .violation-filter .archive-title {
                width: auto;
                text-align: right;
                padding-top: 0;
            }
        }

        /* ========== 违纪列表 ========== */
        .violation-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
            max-height: 450px;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            padding-right: 2px;
        }

        @media (min-width: 640px) {
            .violation-list {
                max-height: 500px;
            }
        }

        .violation-item {
            display: flex;
            flex-direction: column;
            padding: 10px 12px;
            background: #ffffff;
            border-radius: 10px;
            border: 1px solid #eef2f6;
            transition: 0.15s;
            gap: 6px;
        }

        .violation-item:active {
            background: #f1f5f9;
        }

        .violation-item .row {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        @media (min-width: 480px) {
            .violation-item .row {
                flex-direction: row;
                justify-content: space-between;
                align-items: center;
                flex-wrap: wrap;
            }
        }

        .violation-item .info {
            display: flex;
            flex-wrap: wrap;
            gap: 6px 12px;
            align-items: center;
            flex: 1;
        }

        .violation-item .info .v-student {
            font-weight: 600;
            color: #0f172a;
            font-size: 14px;
        }

        .violation-item .info .v-content {
            color: #334155;
            word-break: break-word;
            font-size: 14px;
        }

        .violation-item .info .v-content .highlight {
            background: #fef08a;
            padding: 0 2px;
            border-radius: 2px;
        }

        .violation-item .info .v-time {
            font-size: 11px;
            color: #94a3b8;
            white-space: nowrap;
        }

        .violation-item .status-badge {
            font-size: 12px;
            font-weight: 600;
            padding: 4px 12px;
            border-radius: 40px;
            cursor: pointer;
            user-select: none;
            transition: 0.2s;
            border: 1px solid transparent;
            display: inline-block;
            touch-action: manipulation;
            min-height: 30px;
            line-height: 20px;
        }

        .violation-item .status-badge:active {
            opacity: 0.6;
            transform: scale(0.96);
        }

        .violation-item .status-badge.resolved {
            background: #dcfce7;
            color: #15803d;
            border-color: #86efac;
        }

        .violation-item .status-badge.unresolved {
            background: #fee2e2;
            color: #b91c1c;
            border-color: #fca5a5;
        }

        .violation-item .actions {
            display: flex;
            gap: 4px;
            align-items: center;
            flex-wrap: wrap;
        }

        .violation-item .actions .btn-icon {
            background: transparent;
            border: none;
            font-size: 20px;
            cursor: pointer;
            color: #94a3b8;
            transition: 0.2s;
            padding: 4px 8px;
            border-radius: 6px;
            min-height: 40px;
            min-width: 40px;
            touch-action: manipulation;
        }

        .violation-item .actions .btn-icon:active {
            background: #e9edf2;
        }

        .violation-item .actions .btn-icon.danger:active {
            background: #fee2e2;
        }

        .violation-item .images {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 4px;
        }

        .violation-item .images .img-thumb {
            position: relative;
            width: 56px;
            height: 56px;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid #e9edf2;
            cursor: pointer;
            transition: 0.2s;
            flex-shrink: 0;
            touch-action: manipulation;
        }

        .violation-item .images .img-thumb:active {
            transform: scale(0.95);
        }

        @media (min-width: 480px) {
            .violation-item .images .img-thumb {
                width: 60px;
                height: 60px;
            }
        }

        .violation-item .images .img-thumb img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .violation-item .images .img-thumb .del-img {
            position: absolute;
            top: 2px;
            right: 2px;
            background: rgba(0, 0, 0, 0.65);
            color: #fff;
            border: none;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            font-size: 12px;
            line-height: 20px;
            text-align: center;
            cursor: pointer;
            transition: 0.2s;
            touch-action: manipulation;
        }

        .violation-item .images .img-thumb .del-img:active {
            background: #dc2626;
        }

        .violation-item .upload-btn {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            font-size: 13px;
            color: #2563eb;
            background: transparent;
            border: 1px dashed #d1d9e6;
            border-radius: 8px;
            padding: 4px 12px;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 2px;
            min-height: 36px;
            touch-action: manipulation;
        }

        .violation-item .upload-btn:active {
            border-color: #2563eb;
            background: #eff6ff;
        }

        .violation-item .upload-btn input[type="file"] {
            display: none;
        }

        .violation-empty {
            text-align: center;
            color: #94a3b8;
            padding: 24px 0;
            font-size: 14px;
        }

        /* ========== 图片预览模态框 ========== */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: fadeIn 0.25s ease;
            padding: 12px;
        }

        .modal-overlay .modal-content {
            max-width: 98%;
            max-height: 98%;
            background: transparent;
            border-radius: 12px;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-overlay .modal-content img {
            max-width: 100%;
            max-height: 90vh;
            display: block;
            border-radius: 8px;
            object-fit: contain;
        }

        .modal-overlay .modal-close {
            position: absolute;
            top: 8px;
            right: 8px;
            font-size: 28px;
            color: #fff;
            cursor: pointer;
            background: rgba(0, 0, 0, 0.6);
            width: 44px;
            height: 44px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: none;
            transition: 0.2s;
            touch-action: manipulation;
        }

        .modal-overlay .modal-close:active {
            background: #dc2626;
        }

        @media (min-width: 640px) {
            .modal-overlay .modal-close {
                top: 12px;
                right: 12px;
                width: 48px;
                height: 48px;
                font-size: 32px;
            }
        }

        /* ========== 通用按钮 ========== */
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 14px;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            background: #e9edf2;
            color: #334155;
            touch-action: manipulation;
            min-height: 44px;
            min-width: 44px;
            justify-content: center;
        }

        .btn:active {
            transform: scale(0.96);
        }

        @media (min-width: 640px) {
            .btn {
                padding: 8px 18px;
                min-height: 40px;
            }
            .btn:active {
                transform: scale(0.98);
            }
        }

        .btn-primary {
            background: #2563eb;
            color: #fff;
        }
        .btn-primary:active {
            background: #1d4ed8;
        }

        .btn-success {
            background: #16a34a;
            color: #fff;
        }
        .btn-success:active {
            background: #15803d;
        }

        .btn-danger {
            background: #dc2626;
            color: #fff;
        }
        .btn-danger:active {
            background: #b91c1c;
        }

        .btn-outline {
            background: transparent;
            border: 1.5px solid #d1d9e6;
        }
        .btn-outline:active {
            border-color: #94a3b8;
            background: #f1f5f9;
        }

        .btn-sm {
            padding: 4px 10px;
            font-size: 12px;
            border-radius: 8px;
            min-height: 32px;
            min-width: 32px;
        }

        @media (min-width: 640px) {
            .btn-sm {
                padding: 4px 12px;
                font-size: 13px;
                min-height: 32px;
            }
        }

        .btn-xs {
            padding: 2px 8px;
            font-size: 11px;
            border-radius: 6px;
            min-height: 28px;
            min-width: 28px;
        }

        @media (min-width: 640px) {
            .btn-xs {
                padding: 2px 10px;
                font-size: 12px;
                min-height: 28px;
            }
        }

        /* ========== Tab 导航 ========== */
        .tabs {
            display: flex;
            gap: 3px;
            background: #f1f5f9;
            border-radius: 12px;
            padding: 3px;
            margin-bottom: 16px;
            flex-wrap: nowrap;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }

        @media (min-width: 640px) {
            .tabs {
                gap: 4px;
                border-radius: 14px;
                padding: 4px;
                margin-bottom: 24px;
            }
        }

        .tab-btn {
            flex: 1;
            min-width: 70px;
            padding: 8px 10px;
            border: none;
            background: transparent;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 600;
            color: #64748b;
            cursor: pointer;
            transition: 0.25s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            touch-action: manipulation;
            min-height: 40px;
            white-space: nowrap;
        }

        .tab-btn:active {
            transform: scale(0.96);
        }

        @media (min-width: 640px) {
            .tab-btn {
                min-width: 100px;
                padding: 10px 18px;
                font-size: 15px;
                gap: 8px;
                min-height: 48px;
            }
        }

        .tab-btn.active {
            background: #ffffff;
            color: #2563eb;
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.10);
        }

        .tab-btn .icon {
            font-size: 16px;
        }

        @media (min-width: 640px) {
            .tab-btn .icon {
                font-size: 18px;
            }
        }

        /* ========== Tab 内容面板 ========== */
        .tab-panel {
            display: none;
            animation: fadeIn 0.3s ease;
        }

        .tab-panel.active {
            display: block;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(6px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ========== 考勤打卡页面 ========== */
        .attendance-toolbar {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
            background: #f8fafc;
            padding: 12px 14px;
            border-radius: 12px;
            border: 1px solid #e9edf2;
        }

        @media (min-width: 640px) {
            .attendance-toolbar {
                gap: 14px;
                padding: 14px 18px;
                border-radius: 14px;
                margin-bottom: 22px;
            }
        }

        .attendance-toolbar .left {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
            flex: 1;
        }

        .attendance-toolbar label {
            font-weight: 600;
            font-size: 13px;
            color: #334155;
        }

        .attendance-toolbar input[type="date"] {
            padding: 6px 10px;
            border: 1px solid #d1d9e6;
            border-radius: 8px;
            font-size: 15px;
            background: #fff;
            color: #0f172a;
            outline: none;
            transition: 0.2s;
            min-height: 40px;
            font-size: 16px;
        }

        @media (min-width: 640px) {
            .attendance-toolbar input[type="date"] {
                padding: 8px 14px;
                font-size: 14px;
                min-height: 40px;
            }
        }

        .attendance-toolbar input[type="date"]:focus {
            border-color: #2563eb;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.12);
        }

        #attendanceStatus {
            font-size: 12px;
            color: #64748b;
            word-break: break-word;
        }

        @media (min-width: 640px) {
            #attendanceStatus {
                font-size: 14px;
            }
        }

        /* 学生考勤网格 */
        .student-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 10px;
            margin-top: 4px;
        }

        @media (min-width: 480px) {
            .student-grid {
                grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
                gap: 12px;
            }
        }

        @media (min-width: 640px) {
            .student-grid {
                grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
                gap: 14px;
            }
        }

        .student-card {
            background: #ffffff;
            border: 1.5px solid #e9edf2;
            border-radius: 12px;
            padding: 12px 12px 10px;
            transition: 0.2s;
            display: flex;
            flex-direction: column;
        }

        .student-card:active {
            border-color: #cbd5e1;
        }

        @media (min-width: 640px) {
            .student-card {
                padding: 16px 16px 14px;
                border-radius: 14px;
            }
        }

        .student-card .info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .student-card .name {
            font-weight: 700;
            font-size: 14px;
            color: #0f172a;
        }

        @media (min-width: 640px) {
            .student-card .name {
                font-size: 16px;
            }
        }

        .student-card .class-tag {
            font-size: 11px;
            background: #e9edf2;
            padding: 2px 10px;
            border-radius: 40px;
            color: #475569;
            font-weight: 500;
            white-space: nowrap;
        }

        @media (min-width: 640px) {
            .student-card .class-tag {
                font-size: 12px;
                padding: 2px 12px;
            }
        }

        .student-card .status-btns {
            display: flex;
            gap: 4px;
        }

        .student-card .status-btns .btn {
            flex: 1;
            justify-content: center;
            padding: 5px 0;
            font-size: 12px;
            border-radius: 6px;
            background: #f1f5f9;
            color: #94a3b8;
            border: 2px solid transparent;
            transition: 0.15s;
            min-height: 32px;
            min-width: 0;
        }

        @media (min-width: 640px) {
            .student-card .status-btns .btn {
                padding: 6px 0;
                font-size: 13px;
                border-radius: 8px;
                min-height: 36px;
            }
        }

        .student-card .status-btns .btn:active {
            transform: scale(0.94);
        }

        .student-card .status-btns .btn.active-present {
            background: #dcfce7;
            border-color: #16a34a;
            color: #15803d;
        }

        .student-card .status-btns .btn.active-absent {
            background: #fee2e2;
            border-color: #dc2626;
            color: #b91c1c;
        }

        .student-card .status-btns .btn.active-leave {
            background: #ffedd5;
            border-color: #ea580c;
            color: #c2410c;
        }

        .empty-state {
            text-align: center;
            padding: 40px 16px;
            color: #94a3b8;
        }

        .empty-state .big-icon {
            font-size: 40px;
            margin-bottom: 10px;
            display: block;
        }

        .empty-state p {
            font-size: 15px;
            margin-top: 4px;
        }

        @media (min-width: 640px) {
            .empty-state {
                padding: 50px 20px;
            }
            .empty-state .big-icon {
                font-size: 48px;
            }
        }

        /* ========== 学生管理页面 ========== */
        .manage-form {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 12px;
            background: #f8fafc;
            padding: 14px 16px;
            border-radius: 12px;
            border: 1px solid #e9edf2;
            align-items: flex-end;
        }

        @media (min-width: 640px) {
            .manage-form {
                padding: 18px 20px;
                border-radius: 14px;
                gap: 12px;
                margin-bottom: 16px;
            }
        }

        .manage-form .field {
            display: flex;
            flex-direction: column;
            gap: 4px;
            flex: 1 1 100%;
            min-width: 100px;
        }

        @media (min-width: 480px) {
            .manage-form .field {
                flex: 1 1 40%;
            }
        }

        @media (min-width: 640px) {
            .manage-form .field {
                flex: 1;
                min-width: 140px;
            }
        }

        .manage-form .field label {
            font-size: 12px;
            font-weight: 600;
            color: #475569;
        }

        @media (min-width: 640px) {
            .manage-form .field label {
                font-size: 13px;
            }
        }

        .manage-form .field input {
            padding: 8px 12px;
            border: 1px solid #d1d9e6;
            border-radius: 8px;
            font-size: 15px;
            outline: none;
            transition: 0.2s;
            background: #fff;
            min-height: 40px;
            font-size: 16px;
        }

        @media (min-width: 640px) {
            .manage-form .field input {
                padding: 8px 14px;
                font-size: 14px;
                min-height: 40px;
            }
        }

        .manage-form .field input:focus {
            border-color: #2563eb;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.12);
        }

        .manage-form .btn {
            align-self: flex-end;
            padding: 9px 16px;
            flex: 1 1 100%;
            justify-content: center;
            min-height: 44px;
        }

        @media (min-width: 480px) {
            .manage-form .btn {
                flex: 0 1 auto;
                padding: 9px 24px;
                min-height: 44px;
            }
        }

        /* 导入区域 */
        .import-area {
            margin-top: 10px;
            margin-bottom: 16px;
            background: #f8fafc;
            padding: 12px 14px;
            border-radius: 12px;
            border: 1px solid #e9edf2;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 10px;
        }

        @media (min-width: 640px) {
            .import-area {
                margin-top: 12px;
                margin-bottom: 24px;
                padding: 16px 20px;
                border-radius: 14px;
                gap: 12px;
            }
        }

        .import-area .import-label {
            font-weight: 600;
            font-size: 13px;
            color: #334155;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .import-area .hint {
            font-size: 12px;
            color: #64748b;
            flex: 1;
            min-width: 100px;
        }

        @media (min-width: 640px) {
            .import-area .hint {
                font-size: 13px;
            }
        }

        .import-area .import-result {
            width: 100%;
            margin-top: 4px;
            font-size: 13px;
            color: #475569;
        }

        .student-list {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .student-list-item {
            display: flex;
            flex-direction: column;
            gap: 8px;
            padding: 10px 14px;
            background: #fafcfd;
            border-radius: 10px;
            border: 1px solid #e9edf2;
            transition: 0.15s;
        }

        @media (min-width: 480px) {
            .student-list-item {
                flex-direction: row;
                justify-content: space-between;
                align-items: center;
                padding: 12px 18px;
                gap: 10px;
            }
        }

        .student-list-item:active {
            background: #f1f5f9;
        }

        .student-list-item .info {
            display: flex;
            align-items: center;
            gap: 10px 16px;
            flex-wrap: wrap;
        }

        .student-list-item .info .name {
            font-weight: 600;
            font-size: 14px;
        }

        @media (min-width: 640px) {
            .student-list-item .info .name {
                font-size: 15px;
            }
        }

        .student-list-item .info .class-badge {
            font-size: 12px;
            color: #64748b;
            background: #e9edf2;
            padding: 2px 12px;
            border-radius: 40px;
        }

        .student-list-item .info .meta {
            font-size: 12px;
            color: #94a3b8;
        }

        .student-list-item .actions {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }

        .student-list-item .actions .btn-archive {
            background: transparent;
            border: 1px solid #d1d9e6;
            border-radius: 8px;
            padding: 4px 12px;
            font-size: 13px;
            color: #475569;
            cursor: pointer;
            transition: 0.2s;
            min-height: 36px;
            touch-action: manipulation;
        }

        .student-list-item .actions .btn-archive:active {
            background: #e9edf2;
        }

        /* ========== 统计报表页面 ========== */
        .stats-toolbar {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
            margin-bottom: 16px;
            background: #f8fafc;
            padding: 12px 14px;
            border-radius: 12px;
            border: 1px solid #e9edf2;
        }

        @media (min-width: 640px) {
            .stats-toolbar {
                gap: 14px;
                padding: 14px 18px;
                border-radius: 14px;
                margin-bottom: 24px;
            }
        }

        .stats-toolbar .field {
            display: flex;
            align-items: center;
            gap: 6px;
            flex: 1 1 100%;
        }

        @media (min-width: 480px) {
            .stats-toolbar .field {
                flex: 1 1 40%;
            }
        }

        .stats-toolbar .field label {
            font-weight: 600;
            font-size: 13px;
            color: #475569;
            white-space: nowrap;
        }

        .stats-toolbar .field input[type="date"] {
            padding: 6px 10px;
            border: 1px solid #d1d9e6;
            border-radius: 8px;
            font-size: 15px;
            outline: none;
            background: #fff;
            flex: 1;
            min-height: 40px;
            font-size: 16px;
        }

        @media (min-width: 640px) {
            .stats-toolbar .field input[type="date"] {
                padding: 6px 12px;
                font-size: 14px;
                min-height: 38px;
            }
        }

        .stats-toolbar .field input[type="date"]:focus {
            border-color: #2563eb;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        .stats-toolbar .btn {
            flex: 1 1 100%;
            justify-content: center;
            min-height: 44px;
        }

        @media (min-width: 480px) {
            .stats-toolbar .btn {
                flex: 0 1 auto;
                min-height: 40px;
            }
        }

        .stats-summary {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-bottom: 16px;
        }

        @media (min-width: 480px) {
            .stats-summary {
                grid-template-columns: repeat(4, 1fr);
                gap: 12px;
            }
        }

        @media (min-width: 640px) {
            .stats-summary {
                gap: 14px;
                margin-bottom: 28px;
            }
        }

        .stats-summary .item {
            background: #f8fafc;
            border-radius: 10px;
            padding: 10px 12px;
            text-align: center;
            border: 1px solid #e9edf2;
        }

        .stats-summary .item .num {
            font-size: 20px;
            font-weight: 700;
        }

        .stats-summary .item .lbl {
            font-size: 11px;
            color: #64748b;
        }

        @media (min-width: 480px) {
            .stats-summary .item .num {
                font-size: 22px;
            }
            .stats-summary .item .lbl {
                font-size: 12px;
            }
        }

        @media (min-width: 640px) {
            .stats-summary .item {
                padding: 14px 16px;
            }
            .stats-summary .item .num {
                font-size: 24px;
            }
            .stats-summary .item .lbl {
                font-size: 13px;
            }
        }

        .stats-table-wrap {
            overflow-x: auto;
            border-radius: 10px;
            border: 1px solid #e9edf2;
            -webkit-overflow-scrolling: touch;
        }

        .stats-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
            min-width: 400px;
        }

        @media (min-width: 640px) {
            .stats-table {
                font-size: 14px;
                min-width: 500px;
            }
        }

        .stats-table th {
            background: #f1f5f9;
            text-align: left;
            padding: 8px 12px;
            font-weight: 600;
            color: #334155;
            border-bottom: 2px solid #e2e8f0;
            white-space: nowrap;
        }

        .stats-table td {
            padding: 8px 12px;
            border-bottom: 1px solid #eef2f6;
        }

        @media (min-width: 640px) {
            .stats-table th {
                padding: 12px 16px;
            }
            .stats-table td {
                padding: 10px 16px;
            }
        }

        .stats-table tr:hover td {
            background: #fafcfd;
        }

        .stats-table .rate-bar {
            display: inline-block;
            height: 7px;
            border-radius: 40px;
            background: #e2e8f0;
            width: 60px;
            overflow: hidden;
            vertical-align: middle;
            margin-right: 6px;
        }

        @media (min-width: 640px) {
            .stats-table .rate-bar {
                width: 100px;
                height: 8px;
                margin-right: 10px;
            }
        }

        .stats-table .rate-bar .fill {
            height: 100%;
            border-radius: 40px;
            background: #2563eb;
            transition: width 0.4s;
        }

        .stats-table .rate-bar .fill.high {
            background: #16a34a;
        }
        .stats-table .rate-bar .fill.mid {
            background: #ea580c;
        }
        .stats-table .rate-bar .fill.low {
            background: #dc2626;
        }

        /* ========== Toast ========== */
        .toast-container {
            position: fixed;
            top: 12px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 999;
            display: flex;
            flex-direction: column;
            gap: 8px;
            width: 90%;
            max-width: 400px;
            pointer-events: none;
        }

        @media (min-width: 640px) {
            .toast-container {
                top: 24px;
                left: auto;
                right: 24px;
                transform: none;
                width: auto;
                max-width: 340px;
            }
        }

        .toast {
            padding: 10px 16px;
            border-radius: 10px;
            background: #0f172a;
            color: #fff;
            font-size: 14px;
            font-weight: 500;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.18);
            animation: slideIn 0.3s ease;
            width: 100%;
            pointer-events: auto;
            text-align: center;
        }

        @media (min-width: 640px) {
            .toast {
                padding: 12px 20px;
                text-align: left;
                border-radius: 12px;
            }
        }

        .toast.success {
            background: #16a34a;
        }
        .toast.error {
            background: #dc2626;
        }
        .toast.info {
            background: #2563eb;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-20px) scale(0.95);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .toast-out {
            animation: slideOut 0.25s ease forwards;
        }

        @keyframes slideOut {
            to {
                opacity: 0;
                transform: translateY(-20px) scale(0.95);
            }
        }

        /* ========== 统计报表空状态 ========== */
        .empty-stats {
            padding: 28px 16px;
            text-align: center;
            color: #94a3b8;
        }
        .empty-stats .big-icon {
            font-size: 36px;
            display: block;
            margin-bottom: 8px;
        }

        @media (min-width: 640px) {
            .empty-stats {
                padding: 32px 20px;
            }
            .empty-stats .big-icon {
                font-size: 40px;
            }
        }

        /* ========== 滚动条优化 ========== */
        ::-webkit-scrollbar {
            width: 4px;
            height: 4px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #d1d9e6;
            border-radius: 20px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #b0b8c6;
        }

        /* 安卓上滚动条更细 */
        @media (max-width: 480px) {
            ::-webkit-scrollbar {
                width: 3px;
                height: 3px;
            }
        }
    </style>
</head>
<body>
    <div class="app-container" id="app">
        <!-- ===== 头部 ===== -->
        <header class="app-header">
            <h1><span>📚</span> 学生考勤管理系统</h1>
            <div class="header-actions">
                <span class="header-date" id="headerDate">📅 加载中...</span>
                <button class="btn btn-outline btn-sm" onclick="resetAllData()" title="清除所有数据（慎用）">🗑️ 重置</button>
            </div>
        </header>

        <!-- ===== 统计概览 ===== -->
        <div class="stats-row" id="statsRow">
            <div class="stat-card accent">
                <div class="number" id="totalStudents">0</div>
                <div class="label">👨‍🎓 学生总数</div>
            </div>
            <div class="stat-card green">
                <div class="number" id="todayPresent">0</div>
                <div class="label">✅ 今日出勤</div>
            </div>
            <div class="stat-card orange">
                <div class="number" id="todayAbsent">0</div>
                <div class="label">❌ 今日缺勤</div>
            </div>
            <div class="stat-card purple">
                <div class="number" id="todayRate">0%</div>
                <div class="label">📊 今日出勤率</div>
            </div>
        </div>

        <!-- ===== 违纪记录（折叠面板） ===== -->
        <div class="violation-section">
            <div class="violation-header" onclick="toggleViolationPanel()">
                <span>📋 违纪档案</span>
                <span class="arrow" id="violationArrow">▶</span>
            </div>
            <div class="violation-panel" id="violationPanel" style="display:none;">
                <div class="violation-form">
                    <div class="field">
                        <label for="violationStudent">选择学生</label>
                        <select id="violationStudent"></select>
                    </div>
                    <div class="field" style="flex:2;">
                        <label for="violationContent">违纪内容</label>
                        <input type="text" id="violationContent" placeholder="请输入违纪详情" />
                    </div>
                    <div class="field field-checkbox">
                        <label for="violationResolved">已处理</label>
                        <input type="checkbox" id="violationResolved" />
                    </div>
                    <div class="field field-file">
                        <label for="violationImages">📎 图片</label>
                        <input type="file" id="violationImages" accept="image/*" multiple />
                    </div>
                    <button class="btn btn-primary" onclick="addViolation()">➕ 记录</button>
                    <button class="btn btn-outline" onclick="refreshViolations()">🔄 刷新</button>
                </div>

                <!-- 筛选与搜索区域 -->
                <div class="violation-filter">
                    <label for="archiveFilter">📂 学生：</label>
                    <select id="archiveFilter" onchange="onArchiveFilterChange()">
                        <option value="">全部学生</option>
                    </select>

                    <div class="search-box">
                        <input type="text" id="archiveSearch" placeholder="🔍 搜索姓名/班级/内容..." oninput="onSearchChange()" />
                        <button class="btn-clear" id="searchClearBtn" onclick="clearSearch()">✕</button>
                    </div>

                    <span class="archive-title" id="archiveTitle">显示全部记录</span>
                </div>

                <div id="violationList">
                    <!-- 动态渲染 -->
                </div>
            </div>
        </div>

        <!-- ===== Tab 导航 ===== -->
        <div class="tabs" id="tabNav">
            <button class="tab-btn active" data-tab="attendance">
                <span class="icon">✅</span> 考勤打卡
            </button>
            <button class="tab-btn" data-tab="manage">
                <span class="icon">👨‍🎓</span> 学生管理
            </button>
            <button class="tab-btn" data-tab="stats">
                <span class="icon">📊</span> 统计报表
            </button>
        </div>

        <!-- ========================================================= -->
        <!-- TAB 1: 考勤打卡 -->
        <!-- ========================================================= -->
        <div class="tab-panel active" id="panelAttendance">
            <div class="attendance-toolbar">
                <div class="left">
                    <label for="attendanceDate">📅 日期</label>
                    <input type="date" id="attendanceDate" />
                    <button class="btn btn-outline btn-sm" onclick="loadAttendance()">🔄 刷新</button>
                    <span id="attendanceStatus">未打卡</span>
                </div>
                <div>
                    <button class="btn btn-success btn-sm" onclick="markAllPresent()">
                        ✅ 全部出勤
                    </button>
                </div>
            </div>

            <div id="attendanceGrid" class="student-grid">
                <!-- 动态渲染 -->
            </div>
            <div id="attendanceEmpty" class="empty-state" style="display:none;">
                <span class="big-icon">👨‍🎓</span>
                <p>暂无学生，请先到「学生管理」添加学生。</p>
            </div>
        </div>

        <!-- ========================================================= -->
        <!-- TAB 2: 学生管理（含 Excel 导入） -->
        <!-- ========================================================= -->
        <div class="tab-panel" id="panelManage">
            <div class="manage-form">
                <div class="field">
                    <label for="studentName">姓名</label>
                    <input type="text" id="studentName" placeholder="请输入学生姓名" />
                </div>
                <div class="field">
                    <label for="studentClass">班级</label>
                    <input type="text" id="studentClass" placeholder="如：一年级1班" />
                </div>
                <button class="btn btn-primary" onclick="addStudentFromForm()">➕ 添加学生</button>
            </div>

            <!-- ===== Excel 导入区域 ===== -->
            <div class="import-area">
                <span class="import-label">📤 Excel 导入</span>
                <button class="btn btn-primary btn-sm" id="importExcelBtn">📂 选择文件</button>
                <span class="hint">支持 .xlsx / .xls，第一列为姓名，第二列为班级（可选）</span>
                <input type="file" id="fileInput" accept=".xlsx,.xls" style="display:none;" />
                <div class="import-result" id="importResult"></div>
            </div>

            <div id="studentListContainer">
                <!-- 动态渲染 -->
            </div>
            <div id="manageEmpty" class="empty-state" style="display:none;">
                <span class="big-icon">📭</span>
                <p>还没有学生，快来添加吧！</p>
            </div>
        </div>

        <!-- ========================================================= -->
        <!-- TAB 3: 统计报表 -->
        <!-- ========================================================= -->
        <div class="tab-panel" id="panelStats">
            <div class="stats-toolbar">
                <div class="field">
                    <label for="statsStart">开始</label>
                    <input type="date" id="statsStart" />
                </div>
                <div class="field">
                    <label for="statsEnd">结束</label>
                    <input type="date" id="statsEnd" />
                </div>
                <button class="btn btn-primary btn-sm" onclick="renderStats()">📊 生成报表</button>
                <button class="btn btn-outline btn-sm" onclick="setThisWeek()">📅 本周</button>
                <button class="btn btn-outline btn-sm" onclick="setThisMonth()">📅 本月</button>
            </div>

            <!-- 汇总 -->
            <div class="stats-summary" id="statsSummary">
                <div class="item"><div class="num" id="statsTotalDays">0</div><div class="lbl">统计天数</div></div>
                <div class="item"><div class="num" id="statsTotalPresent">0</div><div class="lbl">总出勤人次</div></div>
                <div class="item"><div class="num" id="statsTotalAbsent">0</div><div class="lbl">总缺勤人次</div></div>
                <div class="item"><div class="num" id="statsTotalLeave">0</div><div class="lbl">总请假人次</div></div>
            </div>

            <div id="statsContent">
                <!-- 动态渲染 -->
            </div>
        </div>
    </div>

    <!-- Toast 容器 -->
    <div class="toast-container" id="toastContainer"></div>

    <!-- 图片预览模态框 -->
    <div id="imageModal" class="modal-overlay" style="display:none;" onclick="closeImageModal(event)">
        <div class="modal-content" onclick="event.stopPropagation()">
            <button class="modal-close" onclick="closeImageModal()">✕</button>
            <img id="modalImage" src="" alt="违纪图片" />
        </div>
    </div>

    <script>
        // ================================================================
        //  数据层
        // ================================================================

        const STORAGE_KEY = 'attendance_system_data';

        function getDefaultData() {
            return {
                students: [],
                records: [],
                violations: []
            };
        }

        function loadData() {
            try {
                const raw = localStorage.getItem(STORAGE_KEY);
                if (raw) {
                    const parsed = JSON.parse(raw);
                    if (!parsed.students) parsed.students = [];
                    if (!parsed.records) parsed.records = [];
                    if (!parsed.violations) parsed.violations = [];
                    parsed.violations = parsed.violations.map(v => {
                        if (v.resolved === undefined) v.resolved = false;
                        if (!v.images) v.images = [];
                        return v;
                    });
                    return parsed;
                }
            } catch (e) {
                console.warn('读取数据失败，使用默认数据', e);
            }
            return getDefaultData();
        }

        function saveData(data) {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
        }

        function genId() {
            return Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
        }

        function formatDateTime(d) {
            const date = d instanceof Date ? d : new Date(d);
            const y = date.getFullYear();
            const m = String(date.getMonth() + 1).padStart(2, '0');
            const day = String(date.getDate()).padStart(2, '0');
            const h = String(date.getHours()).padStart(2, '0');
            const min = String(date.getMinutes()).padStart(2, '0');
            return `${y}-${m}-${day} ${h}:${min}`;
        }

        function formatDate(d) {
            const date = d instanceof Date ? d : new Date(d);
            const y = date.getFullYear();
            const m = String(date.getMonth() + 1).padStart(2, '0');
            const day = String(date.getDate()).padStart(2, '0');
            return `${y}-${m}-${day}`;
        }

        function todayStr() {
            return formatDate(new Date());
        }

        function getWeekday(dateStr) {
            const d = new Date(dateStr + 'T00:00:00');
            return ['日', '一', '二', '三', '四', '五', '六'][d.getDay()];
        }

        function friendlyDate(dateStr) {
            const d = new Date(dateStr + 'T00:00:00');
            const m = d.getMonth() + 1;
            const day = d.getDate();
            const w = getWeekday(dateStr);
            return `${m}月${day}日 周${w}`;
        }

        // ================================================================
        //  Toast 提示
        // ================================================================

        function showToast(message, type = 'info', duration = 2200) {
            const container = document.getElementById('toastContainer');
            const el = document.createElement('div');
            el.className = `toast ${type}`;
            el.textContent = message;
            container.appendChild(el);
            setTimeout(() => {
                el.classList.add('toast-out');
                setTimeout(() => el.remove(), 300);
            }, duration);
        }

        // ================================================================
        //  图片预览
        // ================================================================

        function openImageModal(src) {
            const modal = document.getElementById('imageModal');
            const img = document.getElementById('modalImage');
            img.src = src;
            modal.style.display = 'flex';
        }

        function closeImageModal(e) {
            if (e && e.target !== e.currentTarget) return;
            document.getElementById('imageModal').style.display = 'none';
        }

        document.getElementById('imageModal').addEventListener('click', function(e) {
            if (e.target === this) closeImageModal();
        });

        // ================================================================
        //  核心业务逻辑
        // ================================================================

        let data = loadData();

        function getStudents() {
            return [...data.students].sort((a, b) => a.createdAt - b.createdAt);
        }

        function getAttendanceMap(dateStr) {
            const map = {};
            data.records
                .filter(r => r.date === dateStr)
                .forEach(r => { map[r.studentId] = r.status; });
            return map;
        }

        function getStudentRecords(studentId) {
            return data.records.filter(r => r.studentId === studentId);
        }

        function getStudentRecordsInRange(studentId, startDate, endDate) {
            return data.records.filter(r =>
                r.studentId === studentId &&
                r.date >= startDate &&
                r.date <= endDate
            );
        }

        function setAttendance(studentId, dateStr, status) {
            if (!status) {
                data.records = data.records.filter(r => !(r.studentId === studentId && r.date === dateStr));
                saveData(data);
                return;
            }
            const existing = data.records.find(r => r.studentId === studentId && r.date === dateStr);
            if (existing) {
                existing.status = status;
            } else {
                data.records.push({
                    id: genId(),
                    studentId,
                    date: dateStr,
                    status
                });
            }
            saveData(data);
        }

        function addStudent(name, className) {
            if (!name || !name.trim()) {
                return { success: false, message: '姓名不能为空' };
            }
            const trimmedName = name.trim();
            const trimmedClass = (className || '未分班').trim() || '未分班';
            const exist = data.students.some(s => s.name === trimmedName && s.class === trimmedClass);
            if (exist) {
                return { success: false, message: `学生 "${trimmedName}"（${trimmedClass}）已存在` };
            }
            data.students.push({
                id: genId(),
                name: trimmedName,
                class: trimmedClass,
                createdAt: Date.now()
            });
            saveData(data);
            return { success: true, message: `已添加：${trimmedName}` };
        }

        function deleteStudent(studentId) {
            const student = data.students.find(s => s.id === studentId);
            if (!student) return;
            if (!confirm(`确定要删除学生 "${student.name}" 吗？\n该学生的所有考勤记录和违纪记录也会被删除。`)) return;
            data.students = data.students.filter(s => s.id !== studentId);
            data.records = data.records.filter(r => r.studentId !== studentId);
            data.violations = data.violations.filter(v => v.studentId !== studentId);
            saveData(data);
            showToast(`已删除学生：${student.name}`, 'info');
            refreshAll();
        }

        function resetAllData() {
            if (!confirm('⚠️ 确定要清除所有数据吗？此操作不可恢复！')) return;
            if (!confirm('再次确认：所有学生、考勤和违纪记录将被删除！')) return;
            data = getDefaultData();
            saveData(data);
            showToast('已重置所有数据', 'info');
            refreshAll();
        }

        // ================================================================
        //  违纪记录相关
        // ================================================================

        function getViolations() {
            return [...data.violations].sort((a, b) => new Date(b.date) - new Date(a.date));
        }

        function getViolationsByStudent(studentId) {
            return data.violations.filter(v => v.studentId === studentId).sort((a, b) => new Date(b.date) - new Date(a.date));
        }

        function addViolationRecord(studentId, content, resolved, images) {
            if (!studentId) {
                showToast('请选择学生', 'error');
                return false;
            }
            if (!content || !content.trim()) {
                showToast('请输入违纪内容', 'error');
                return false;
            }
            const student = data.students.find(s => s.id === studentId);
            if (!student) {
                showToast('所选学生不存在', 'error');
                return false;
            }
            data.violations.push({
                id: genId(),
                studentId,
                content: content.trim(),
                date: new Date().toISOString(),
                resolved: !!resolved,
                images: images || []
            });
            saveData(data);
            showToast(`已记录 ${student.name} 的违纪行为`, 'success');
            refreshViolationsUI();
            return true;
        }

        function deleteViolation(violationId) {
            if (!confirm('确定要删除这条违纪记录吗？')) return;
            data.violations = data.violations.filter(v => v.id !== violationId);
            saveData(data);
            refreshViolationsUI();
            showToast('已删除违纪记录', 'info');
        }

        function toggleResolved(violationId) {
            const v = data.violations.find(item => item.id === violationId);
            if (!v) return;
            v.resolved = !v.resolved;
            saveData(data);
            refreshViolationsUI();
            showToast(v.resolved ? '已标记为已处理' : '已标记为未处理', 'info');
        }

        function addImagesToViolation(violationId, files) {
            const v = data.violations.find(item => item.id === violationId);
            if (!v) {
                showToast('记录不存在', 'error');
                return;
            }
            if (!files || files.length === 0) return;
            const readers = [];
            let loaded = 0;
            for (let i = 0; i < files.length; i++) {
                const file = files[i];
                if (!file.type.startsWith('image/')) {
                    showToast(`${file.name} 不是图片文件`, 'error');
                    continue;
                }
                const reader = new FileReader();
                readers.push(new Promise((resolve) => {
                    reader.onload = function(e) {
                        v.images.push(e.target.result);
                        loaded++;
                        resolve();
                    };
                    reader.readAsDataURL(file);
                }));
            }
            Promise.all(readers).then(() => {
                if (loaded > 0) {
                    saveData(data);
                    refreshViolationsUI();
                    showToast(`成功添加 ${loaded} 张图片`, 'success');
                }
            }).catch(err => {
                showToast('图片读取失败', 'error');
                console.error(err);
            });
        }

        function deleteImage(violationId, index) {
            const v = data.violations.find(item => item.id === violationId);
            if (!v) return;
            if (!confirm('确定要删除这张图片吗？')) return;
            v.images.splice(index, 1);
            saveData(data);
            refreshViolationsUI();
            showToast('已删除图片', 'info');
        }

        function renderViolationSelect() {
            const select = document.getElementById('violationStudent');
            const students = getStudents();
            select.innerHTML = '<option value="">-- 请选择学生 --</option>';
            students.forEach(s => {
                const option = document.createElement('option');
                option.value = s.id;
                option.textContent = `${s.name}（${s.class}）`;
                select.appendChild(option);
            });
        }

        function renderArchiveFilter() {
            const select = document.getElementById('archiveFilter');
            const students = getStudents();
            const currentVal = select.value;
            select.innerHTML = '<option value="">全部学生</option>';
            students.forEach(s => {
                const option = document.createElement('option');
                option.value = s.id;
                option.textContent = `${s.name}（${s.class}）`;
                select.appendChild(option);
            });
            if (currentVal && students.some(s => s.id === currentVal)) {
                select.value = currentVal;
            } else {
                select.value = '';
            }
        }

        function highlightText(text, keyword) {
            if (!keyword || !text) return escapeHtml(text);
            const escaped = escapeHtml(text);
            const kw = escapeHtml(keyword);
            const regex = new RegExp(`(${kw.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi');
            return escaped.replace(regex, '<span class="highlight">$1</span>');
        }

        function renderViolationList(filterStudentId, searchKeyword) {
            const container = document.getElementById('violationList');
            let violations = getViolations();

            if (filterStudentId) {
                violations = violations.filter(v => v.studentId === filterStudentId);
            }

            if (searchKeyword && searchKeyword.trim()) {
                const kw = searchKeyword.trim().toLowerCase();
                const students = getStudents();
                const studentMap = {};
                students.forEach(s => { studentMap[s.id] = s; });

                violations = violations.filter(v => {
                    const student = studentMap[v.studentId];
                    const name = student ? student.name.toLowerCase() : '';
                    const cls = student ? student.class.toLowerCase() : '';
                    const content = v.content.toLowerCase();
                    return name.includes(kw) || cls.includes(kw) || content.includes(kw);
                });
            }

            if (violations.length === 0) {
                container.innerHTML = `<div class="violation-empty">📭 暂无匹配的违纪记录</div>`;
                return;
            }

            const students = getStudents();
            const studentMap = {};
            students.forEach(s => { studentMap[s.id] = s; });

            let html = '<div class="violation-list">';
            violations.forEach(v => {
                const student = studentMap[v.studentId];
                const name = student ? student.name : '（已删除）';
                const cls = student ? student.class : '';
                const time = formatDateTime(v.date);

                const displayName = searchKeyword ? highlightText(name, searchKeyword) : escapeHtml(name);
                const displayCls = searchKeyword && cls ? highlightText(cls, searchKeyword) : escapeHtml(cls);
                const displayContent = searchKeyword ? highlightText(v.content, searchKeyword) : escapeHtml(v.content);

                const statusLabel = v.resolved ? '✅ 已处理' : '⏳ 未处理';
                const statusClass = v.resolved ? 'resolved' : 'unresolved';

                let imagesHtml = '';
                if (v.images && v.images.length > 0) {
                    imagesHtml = '<div class="images">';
                    v.images.forEach((img, idx) => {
                        imagesHtml += `
                            <div class="img-thumb" onclick="openImageModal('${img}')">
                                <img src="${img}" alt="违纪图片${idx+1}" />
                                <button class="del-img" onclick="event.stopPropagation();deleteImage('${v.id}', ${idx})">✕</button>
                            </div>
                        `;
                    });
                    imagesHtml += '</div>';
                }

                const uploadId = `upload_${v.id}`;
                imagesHtml += `
                    <div class="upload-btn" onclick="document.getElementById('${uploadId}').click()">
                        📎 添加图片
                        <input type="file" id="${uploadId}" accept="image/*" multiple 
                               onchange="document.getElementById('${uploadId}').files && addImagesToViolation('${v.id}', this.files); this.value='';" />
                    </div>
                `;

                html += `
                    <div class="violation-item">
                        <div class="row">
                            <div class="info">
                                <span class="v-student">${displayName} ${cls ? '· ' + displayCls : ''}</span>
                                <span class="v-content">${displayContent}</span>
                                <span class="v-time">${time}</span>
                            </div>
                            <div class="actions">
                                <span class="status-badge ${statusClass}" onclick="toggleResolved('${v.id}')" title="点击切换处理状态">${statusLabel}</span>
                                <button class="btn-icon danger" onclick="deleteViolation('${v.id}')" title="删除记录">🗑️</button>
                            </div>
                        </div>
                        ${imagesHtml}
                    </div>
                `;
            });
            html += '</div>';
            container.innerHTML = html;
        }

        function refreshViolationsUI() {
            renderViolationSelect();
            renderArchiveFilter();

            const filterSelect = document.getElementById('archiveFilter');
            const filterVal = filterSelect ? filterSelect.value : '';

            const searchInput = document.getElementById('archiveSearch');
            const searchVal = searchInput ? searchInput.value : '';

            renderViolationList(filterVal, searchVal);

            const titleEl = document.getElementById('archiveTitle');
            const students = getStudents();
            let titleText = '';
            if (filterVal) {
                const student = students.find(s => s.id === filterVal);
                titleText = student ? `📄 ${student.name} 的违纪档案` : '显示全部记录';
            } else {
                titleText = '显示全部记录';
            }
            if (searchVal && searchVal.trim()) {
                titleText += ` · 搜索 "${searchVal.trim()}"`;
            }
            titleEl.textContent = titleText;

            const clearBtn = document.getElementById('searchClearBtn');
            if (searchVal && searchVal.trim()) {
                clearBtn.classList.add('visible');
            } else {
                clearBtn.classList.remove('visible');
            }
        }

        function onArchiveFilterChange() {
            refreshViolationsUI();
        }

        function onSearchChange() {
            refreshViolationsUI();
        }

        function clearSearch() {
            const input = document.getElementById('archiveSearch');
            input.value = '';
            refreshViolationsUI();
            input.focus();
        }

        function toggleViolationPanel() {
            const panel = document.getElementById('violationPanel');
            const arrow = document.getElementById('violationArrow');
            if (panel.style.display === 'none') {
                panel.style.display = 'block';
                arrow.classList.add('open');
                refreshViolationsUI();
            } else {
                panel.style.display = 'none';
                arrow.classList.remove('open');
            }
        }

        function addViolation() {
            const select = document.getElementById('violationStudent');
            const content = document.getElementById('violationContent');
            const resolved = document.getElementById('violationResolved').checked;
            const fileInput = document.getElementById('violationImages');
            const files = fileInput.files;

            const studentId = select.value;
            const text = content.value;

            if (files && files.length > 0) {
                const readers = [];
                const imageData = [];
                let hasError = false;
                for (let i = 0; i < files.length; i++) {
                    const file = files[i];
                    if (!file.type.startsWith('image/')) {
                        showToast(`${file.name} 不是图片文件`, 'error');
                        hasError = true;
                        break;
                    }
                    const reader = new FileReader();
                    readers.push(new Promise((resolve) => {
                        reader.onload = function(e) {
                            imageData.push(e.target.result);
                            resolve();
                        };
                        reader.readAsDataURL(file);
                    }));
                }
                if (hasError) return;
                Promise.all(readers).then(() => {
                    const success = addViolationRecord(studentId, text, resolved, imageData);
                    if (success) {
                        content.value = '';
                        document.getElementById('violationResolved').checked = false;
                        fileInput.value = '';
                    }
                }).catch(err => {
                    showToast('图片读取失败', 'error');
                    console.error(err);
                });
            } else {
                const success = addViolationRecord(studentId, text, resolved, []);
                if (success) {
                    content.value = '';
                    document.getElementById('violationResolved').checked = false;
                    fileInput.value = '';
                }
            }
        }

        function refreshViolations() {
            refreshViolationsUI();
            showToast('已刷新', 'info');
        }

        function viewStudentViolation(studentId) {
            const panel = document.getElementById('violationPanel');
            const arrow = document.getElementById('violationArrow');
            if (panel.style.display === 'none') {
                panel.style.display = 'block';
                arrow.classList.add('open');
            }
            const filterSelect = document.getElementById('archiveFilter');
            if (filterSelect) {
                filterSelect.value = studentId;
                const searchInput = document.getElementById('archiveSearch');
                if (searchInput) searchInput.value = '';
                onArchiveFilterChange();
            }
            document.querySelector('.violation-section').scrollIntoView({ behavior: 'smooth' });
        }

        // ================================================================
        //  Excel 导入
        // ================================================================

        function importExcel(file) {
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const arrayBuffer = e.target.result;
                    const workbook = XLSX.read(arrayBuffer, { type: 'array' });
                    const firstSheet = workbook.Sheets[workbook.SheetNames[0]];
                    const json = XLSX.utils.sheet_to_json(firstSheet, { header: 1 });

                    let startRow = 0;
                    if (json.length > 0) {
                        const firstRow = json[0];
                        if (firstRow && firstRow.length > 0) {
                            const firstCell = String(firstRow[0] || '').toLowerCase();
                            if (firstCell.includes('姓名') || firstCell.includes('名字') || firstCell.includes('学生')) {
                                startRow = 1;
                            }
                        }
                    }

                    let added = 0;
                    let skipped = 0;
                    const students = getStudents();
                    const existingSet = new Set(students.map(s => `${s.name}|${s.class}`));

                    for (let i = startRow; i < json.length; i++) {
                        const row = json[i];
                        if (!row || row.length === 0) continue;
                        let name = String(row[0] || '').trim();
                        if (!name) continue;
                        let cls = String(row[1] || '').trim() || '未分班';

                        const key = `${name}|${cls}`;
                        if (existingSet.has(key)) {
                            skipped++;
                            continue;
                        }

                        data.students.push({
                            id: genId(),
                            name,
                            class: cls,
                            createdAt: Date.now()
                        });
                        existingSet.add(key);
                        added++;
                    }

                    saveData(data);
                    refreshAll();
                    const resultMsg = `✅ 导入成功：新增 ${added} 名学生，跳过 ${skipped} 名（已存在或无效）`;
                    document.getElementById('importResult').textContent = resultMsg;
                    showToast(`导入完成：新增 ${added} 人`, 'success');
