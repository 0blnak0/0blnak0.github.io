                } catch (err) {
                    showToast('文件解析失败：' + err.message, 'error');
                    document.getElementById('importResult').textContent = `❌ 导入失败：${err.message}`;
                }
            };
            reader.readAsArrayBuffer(file);
        }

        // ================================================================
        //  渲染层
        // ================================================================

        function refreshAll() {
            updateStats();
            renderAttendance();
            renderStudentList();
            renderStats();
            const panel = document.getElementById('violationPanel');
            if (panel.style.display !== 'none') {
                refreshViolationsUI();
            }
            document.getElementById('headerDate').textContent = `📅 ${todayStr()} 周${getWeekday(todayStr())}`;
        }

        function updateStats() {
            const students = getStudents();
            const total = students.length;
            document.getElementById('totalStudents').textContent = total;

            const today = document.getElementById('attendanceDate').value || todayStr();
            const map = getAttendanceMap(today);
            const present = Object.values(map).filter(v => v === 'present').length;
            const absent = Object.values(map).filter(v => v === 'absent').length;
            const marked = Object.keys(map).length;
            const rate = marked > 0 ? Math.round((present / marked) * 100) : 0;

            document.getElementById('todayPresent').textContent = present;
            document.getElementById('todayAbsent').textContent = absent;
            document.getElementById('todayRate').textContent = marked > 0 ? `${rate}%` : '—';
        }

        function renderAttendance() {
            const container = document.getElementById('attendanceGrid');
            const empty = document.getElementById('attendanceEmpty');
            const students = getStudents();
            const dateStr = document.getElementById('attendanceDate').value || todayStr();
            const map = getAttendanceMap(dateStr);

            const markedCount = Object.keys(map).length;
            const statusEl = document.getElementById('attendanceStatus');
            if (markedCount === 0) {
                statusEl.textContent = '📌 今日尚未打卡';
                statusEl.style.color = '#94a3b8';
            } else {
                const present = Object.values(map).filter(v => v === 'present').length;
                const absent = Object.values(map).filter(v => v === 'absent').length;
                const leave = Object.values(map).filter(v => v === 'leave').length;
                statusEl.textContent = `✅ ${present} 出勤  ❌ ${absent} 缺勤  📋 ${leave} 请假  （共 ${markedCount} 人）`;
                statusEl.style.color = '#334155';
            }

            if (students.length === 0) {
                container.innerHTML = '';
                empty.style.display = 'block';
                return;
            }
            empty.style.display = 'none';

            let html = '';
            students.forEach(student => {
                const status = map[student.id] || '';
                const isPresent = status === 'present';
                const isAbsent = status === 'absent';
                const isLeave = status === 'leave';

                html += `
                    <div class="student-card">
                        <div class="info">
                            <span class="name">${escapeHtml(student.name)}</span>
                            <span class="class-tag">${escapeHtml(student.class)}</span>
                        </div>
                        <div class="status-btns">
                            <button class="btn ${isPresent ? 'active-present' : ''}" 
                                    onclick="setAttendanceStatus('${student.id}','present')">
                                ✅ 出勤
                            </button>
                            <button class="btn ${isAbsent ? 'active-absent' : ''}" 
                                    onclick="setAttendanceStatus('${student.id}','absent')">
                                ❌ 缺勤
                            </button>
                            <button class="btn ${isLeave ? 'active-leave' : ''}" 
                                    onclick="setAttendanceStatus('${student.id}','leave')">
                                📋 请假
                            </button>
                        </div>
                    </div>
                `;
            });
            container.innerHTML = html;
        }

        function setAttendanceStatus(studentId, status) {
            const dateStr = document.getElementById('attendanceDate').value || todayStr();
            const student = data.students.find(s => s.id === studentId);
            if (!student) return;

            const map = getAttendanceMap(dateStr);
            if (map[studentId] === status) {
                setAttendance(studentId, dateStr, null);
                showToast(`已取消 ${student.name} 的标记`, 'info');
            } else {
                setAttendance(studentId, dateStr, status);
                const statusMap = { present: '出勤', absent: '缺勤', leave: '请假' };
                showToast(`${student.name}：${statusMap[status]} ✅`, 'success');
            }
            refreshAll();
        }

        function markAllPresent() {
            const students = getStudents();
            if (students.length === 0) {
                showToast('暂无学生', 'error');
                return;
            }
            const dateStr = document.getElementById('attendanceDate').value || todayStr();
            students.forEach(s => {
                setAttendance(s.id, dateStr, 'present');
            });
            showToast(`✅ 已标记 ${students.length} 名学生全部出勤`, 'success');
            refreshAll();
        }

        function loadAttendance() {
            refreshAll();
            showToast('已刷新', 'info');
        }

        function renderStudentList() {
            const container = document.getElementById('studentListContainer');
            const empty = document.getElementById('manageEmpty');
            const students = getStudents();

            if (students.length === 0) {
                container.innerHTML = '';
                empty.style.display = 'block';
                return;
            }
            empty.style.display = 'none';

            let html = '<div class="student-list">';
            students.forEach(s => {
                const recordCount = getStudentRecords(s.id).length;
                const violationCount = getViolationsByStudent(s.id).length;
                html += `
                    <div class="student-list-item">
                        <div class="info">
                            <span class="name">${escapeHtml(s.name)}</span>
                            <span class="class-badge">${escapeHtml(s.class)}</span>
                            <span class="meta">📊 ${recordCount} 条考勤 · 📋 ${violationCount} 次违纪</span>
                        </div>
                        <div class="actions">
                            <button class="btn-archive" onclick="viewStudentViolation('${s.id}')" title="查看违纪档案">📋 档案</button>
                            <button class="btn btn-danger btn-xs" onclick="deleteStudent('${s.id}')">🗑️ 删除</button>
                        </div>
                    </div>
                `;
            });
            html += '</div>';
            container.innerHTML = html;
        }

        function addStudentFromForm() {
            const nameInput = document.getElementById('studentName');
            const classInput = document.getElementById('studentClass');
            const name = nameInput.value;
            const cls = classInput.value;
            const result = addStudent(name, cls);
            if (result.success) {
                nameInput.value = '';
                classInput.value = '';
                showToast(result.message, 'success');
                refreshAll();
            } else {
                showToast(result.message, 'error');
            }
        }

        // ================================================================
        //  统计报表
        // ================================================================

        function renderStats() {
            const startInput = document.getElementById('statsStart');
            const endInput = document.getElementById('statsEnd');
            let start = startInput.value;
            let end = endInput.value;

            if (!start || !end) {
                const today = new Date();
                const sevenDaysAgo = new Date(today);
                sevenDaysAgo.setDate(today.getDate() - 6);
                start = formatDate(sevenDaysAgo);
                end = formatDate(today);
                startInput.value = start;
                endInput.value = end;
            }

            const students = getStudents();
            if (students.length === 0) {
                document.getElementById('statsContent').innerHTML = `
                    <div class="empty-stats">
                        <span class="big-icon">📭</span>
                        <p>暂无学生数据，无法生成统计报表。</p>
                    </div>
                `;
                document.getElementById('statsSummary').innerHTML = `
                    <div class="item"><div class="num">0</div><div class="lbl">统计天数</div></div>
                    <div class="item"><div class="num">0</div><div class="lbl">总出勤人次</div></div>
                    <div class="item"><div class="num">0</div><div class="lbl">总缺勤人次</div></div>
                    <div class="item"><div class="num">0</div><div class="lbl">总请假人次</div></div>
                `;
                return;
            }

            const dates = [];
            let current = new Date(start + 'T00:00:00');
            const endDate = new Date(end + 'T00:00:00');
            while (current <= endDate) {
                dates.push(formatDate(current));
                current.setDate(current.getDate() + 1);
            }

            if (dates.length === 0) {
                document.getElementById('statsContent').innerHTML = `
                    <div class="empty-stats">
                        <span class="big-icon">📅</span>
                        <p>请选择有效的日期范围。</p>
                    </div>
                `;
                return;
            }

            const studentStats = students.map(student => {
                const records = getStudentRecordsInRange(student.id, start, end);
                const present = records.filter(r => r.status === 'present').length;
                const absent = records.filter(r => r.status === 'absent').length;
                const leave = records.filter(r => r.status === 'leave').length;
                const total = dates.length;
                const rate = total > 0 ? Math.round((present / total) * 100) : 0;
                return { student, present, absent, leave, total, rate };
            });

            const totalPresent = studentStats.reduce((sum, s) => sum + s.present, 0);
            const totalAbsent = studentStats.reduce((sum, s) => sum + s.absent, 0);
            const totalLeave = studentStats.reduce((sum, s) => sum + s.leave, 0);

            document.getElementById('statsTotalDays').textContent = dates.length;
            document.getElementById('statsTotalPresent').textContent = totalPresent;
            document.getElementById('statsTotalAbsent').textContent = totalAbsent;
            document.getElementById('statsTotalLeave').textContent = totalLeave;

            const dailyStats = dates.map(date => {
                const map = getAttendanceMap(date);
                const present = Object.values(map).filter(v => v === 'present').length;
                const absent = Object.values(map).filter(v => v === 'absent').length;
                const leave = Object.values(map).filter(v => v === 'leave').length;
                const total = Object.keys(map).length;
                return { date, present, absent, leave, total };
            });

            let html = `
                <div style="margin-bottom:16px;font-weight:600;font-size:15px;color:#0f172a;">
                    📋 考勤明细（${dates.length} 天）
                </div>
                <div class="stats-table-wrap">
                    <table class="stats-table">
                        <thead>
                            <tr>
                                <th>姓名</th>
                                <th>班级</th>
                                <th>✅ 出勤</th>
                                <th>❌ 缺勤</th>
                                <th>📋 请假</th>
                                <th>📊 出勤率</th>
                            </tr>
                        </thead>
                        <tbody>
            `;

            studentStats.forEach(s => {
                const rateClass = s.rate >= 80 ? 'high' : (s.rate >= 50 ? 'mid' : 'low');
                html += `
                    <tr>
                        <td><strong>${escapeHtml(s.student.name)}</strong></td>
                        <td>${escapeHtml(s.student.class)}</td>
                        <td style="color:#16a34a;font-weight:600;">${s.present}</td>
                        <td style="color:#dc2626;">${s.absent}</td>
                        <td style="color:#ea580c;">${s.leave}</td>
                        <td>
                            <div class="rate-bar">
                                <div class="fill ${rateClass}" style="width:${s.rate}%;"></div>
                            </div>
                            ${s.rate}%
                        </td>
                    </tr>
                `;
            });

            html += `
                        </tbody>
                    </table>
                </div>
            `;

            html += `
                <div style="margin:20px 0 12px;font-weight:600;font-size:15px;color:#0f172a;">
                    📅 每日考勤汇总
                </div>
                <div class="stats-table-wrap">
                    <table class="stats-table">
                        <thead>
                            <tr>
                                <th>日期</th>
                                <th>✅ 出勤</th>
                                <th>❌ 缺勤</th>
                                <th>📋 请假</th>
                                <th>📊 已打卡 / 总人数</th>
                            </tr>
                        </thead>
                        <tbody>
            `;

            dailyStats.forEach(d => {
                const totalStudents = students.length;
                const marked = d.total;
                html += `
                    <tr>
                        <td>${friendlyDate(d.date)}</td>
                        <td style="color:#16a34a;font-weight:600;">${d.present}</td>
                        <td style="color:#dc2626;">${d.absent}</td>
                        <td style="color:#ea580c;">${d.leave}</td>
                        <td>${marked} / ${totalStudents}</td>
                    </tr>
                `;
            });

            html += `
                        </tbody>
                    </table>
                </div>
            `;

            document.getElementById('statsContent').innerHTML = html;
        }

        // ================================================================
        //  辅助工具
        // ================================================================

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function setThisWeek() {
            const today = new Date();
            const day = today.getDay();
            const diff = today.getDate() - day + (day === 0 ? -6 : 1);
            const monday = new Date(today);
            monday.setDate(diff);
            const sunday = new Date(monday);
            sunday.setDate(monday.getDate() + 6);
            document.getElementById('statsStart').value = formatDate(monday);
            document.getElementById('statsEnd').value = formatDate(sunday);
            renderStats();
        }

        function setThisMonth() {
            const today = new Date();
            const first = new Date(today.getFullYear(), today.getMonth(), 1);
            const last = new Date(today.getFullYear(), today.getMonth() + 1, 0);
            document.getElementById('statsStart').value = formatDate(first);
            document.getElementById('statsEnd').value = formatDate(last);
            renderStats();
        }

        // ================================================================
        //  Tab 切换
        // ================================================================

        document.getElementById('tabNav').addEventListener('click', function(e) {
            const btn = e.target.closest('.tab-btn');
            if (!btn) return;
            const tab = btn.dataset.tab;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
            document.getElementById(`panel${tab.charAt(0).toUpperCase() + tab.slice(1)}`).classList.add('active');
            if (tab === 'stats') {
                renderStats();
            }
            if (tab === 'attendance') {
                updateStats();
                renderAttendance();
            }
            if (tab === 'manage') {
                renderStudentList();
                document.getElementById('importResult').textContent = '';
            }
        });

        // ================================================================
        //  事件绑定
        // ================================================================

        document.getElementById('violationContent').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                addViolation();
            }
        });

        document.getElementById('archiveSearch').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                refreshViolationsUI();
            }
        });

        document.getElementById('attendanceDate').addEventListener('change', function() {
            refreshAll();
        });

        document.getElementById('studentName').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                document.getElementById('studentClass').focus();
            }
        });
        document.getElementById('studentClass').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                addStudentFromForm();
            }
        });

        document.getElementById('statsStart').addEventListener('change', renderStats);
        document.getElementById('statsEnd').addEventListener('change', renderStats);

        document.getElementById('importExcelBtn').addEventListener('click', function() {
            document.getElementById('fileInput').click();
        });
        document.getElementById('fileInput').addEventListener('change', function(e) {
            if (this.files && this.files.length > 0) {
                if (typeof XLSX === 'undefined') {
                    showToast('Excel 解析库未加载，请检查网络后刷新页面', 'error');
                    document.getElementById('importResult').textContent = '❌ 解析库未加载，请刷新重试';
                    this.value = '';
                    return;
                }
                importExcel(this.files[0]);
                this.value = '';
            }
        });

        // ================================================================
        //  初始化
        // ================================================================

        (function init() {
            const today = todayStr();
            document.getElementById('attendanceDate').value = today;
            document.getElementById('headerDate').textContent = `📅 ${today} 周${getWeekday(today)}`;

            const d = new Date();
            const sevenAgo = new Date(d);
            sevenAgo.setDate(d.getDate() - 6);
            document.getElementById('statsStart').value = formatDate(sevenAgo);
            document.getElementById('statsEnd').value = formatDate(d);

            refreshAll();
        })();

        // 暴露全局方法
        window.addStudentFromForm = addStudentFromForm;
        window.deleteStudent = deleteStudent;
        window.setAttendanceStatus = setAttendanceStatus;
        window.markAllPresent = markAllPresent;
        window.loadAttendance = loadAttendance;
        window.renderStats = renderStats;
        window.setThisWeek = setThisWeek;
        window.setThisMonth = setThisMonth;
        window.resetAllData = resetAllData;
        window.refreshAll = refreshAll;
        window.toggleViolationPanel = toggleViolationPanel;
        window.addViolation = addViolation;
        window.deleteViolation = deleteViolation;
        window.refreshViolations = refreshViolations;
        window.viewStudentViolation = viewStudentViolation;
        window.onArchiveFilterChange = onArchiveFilterChange;
        window.onSearchChange = onSearchChange;
        window.clearSearch = clearSearch;
        window.toggleResolved = toggleResolved;
        window.addImagesToViolation = addImagesToViolation;
        window.deleteImage = deleteImage;
        window.openImageModal = openImageModal;
        window.closeImageModal = closeImageModal;
    </script>
</body>
</html>
